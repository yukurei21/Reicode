<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>霧雨魔法キノコ園</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --c-bg: #1a1208;
  --c-panel: #221810;
  --c-border: #6b4226;
  --c-border-light: #a0623a;
  --c-cream: #f5e6c8;
  --c-gold: #d4a017;
  --c-green: #4a7c2f;
  --c-green-l: #7ab648;
  --c-brown: #3d2b1f;
  --c-brown-m: #5c3d2e;
  --c-red: #c0392b;
  --c-blue: #2471a3;
  --c-blue-l: #5dade2;
}
html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--c-bg);
  font-family: 'Courier New', monospace;
  color: var(--c-cream);
  user-select: none;
  image-rendering: pixelated;
}
#app {
  display: flex;
  height: 100dvh;
  overflow: hidden;
}

/* ===== LEFT MENU BAR ===== */
#menu-bar {
  width: 48px;
  flex-shrink: 0;
  background: linear-gradient(180deg, #0d0800, var(--c-panel));
  border-right: 2px solid var(--c-border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 6px 0;
  gap: 4px;
  z-index: 30;
  overflow: hidden;
}
.mb-btn {
  width: 40px; height: 40px;
  background: linear-gradient(180deg, var(--c-brown-m), var(--c-brown));
  border: 2px solid var(--c-border);
  border-radius: 8px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer;
  transition: all .15s;
  flex-shrink: 0;
}
.mb-btn .mb-sub { font-size: 6px; color: #8a7060; margin-top: 1px; }
.mb-btn.active {
  border-color: var(--c-gold);
  background: linear-gradient(180deg, #4a3820, #2d2010);
  box-shadow: 0 0 6px rgba(212,160,23,.4);
}
.mb-btn:active { transform: scale(.88); }
.mb-sep { width: 32px; height: 1px; background: var(--c-border); margin: 2px 0; flex-shrink: 0; }

/* ===== MAIN COLUMN ===== */
#main-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ===== HEADER ===== */
#header {
  background: linear-gradient(180deg, #0d0800, var(--c-panel));
  border-bottom: 2px solid var(--c-border);
  padding: 4px 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  position: relative;
  z-index: 25;
}
#header::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, var(--c-gold), transparent);
  animation: shimmer 2.5s infinite;
}
@keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
.hstat { display:flex; flex-direction:column; align-items:center; min-width:55px; }
.hstat-l { font-size:7px; color:#8a7060; text-transform:uppercase; letter-spacing:.5px; }
.hstat-v { font-size:13px; font-weight:bold; color:var(--c-gold); }
.hstat-v.g { color:var(--c-green-l); }
.hstat-v.b { color:var(--c-blue-l); }
#header-title { font-size:10px; color:var(--c-cream); text-align:center; opacity:.8; }

/* ===== ISO VIEWPORT ===== */
#iso-vp {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: radial-gradient(ellipse at 40% 30%, rgba(60,100,30,.15) 0%, transparent 65%), var(--c-bg);
  touch-action: none;
}
#iso-stage {
  position: absolute;
  transform-origin: 0 0;
}

/* ===== ISO TILE ===== */
.t {
  position: absolute;
  cursor: pointer;
  transform-style: preserve-3d;
}
.t-top, .t-left, .t-right { position: absolute; }
.t-top {
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  transition: filter .1s;
}
.t:hover .t-top { filter: brightness(1.25); }
.t-left { clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); }
.t-right { clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); }

/* ===== BUILDING SPRITE ===== */
.bld {
  position: absolute;
  display: flex; flex-direction: column;
  align-items: center;
  pointer-events: none;
  image-rendering: pixelated;
}
.bld-body {
  border: 2px solid rgba(255,255,255,.15);
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  position: relative;
  image-rendering: pixelated;
}
.bld-name {
  font-size: 6px; color: var(--c-cream);
  background: rgba(0,0,0,.65); padding: 1px 3px;
  border-radius: 2px; white-space: nowrap; margin-top: 1px;
  max-width: 60px; overflow: hidden; text-overflow: ellipsis;
}
.bld-pb { width: 28px; height: 3px; background: rgba(0,0,0,.5); border-radius: 2px; overflow:hidden; margin-top:1px; }
.bld-pf { height:100%; border-radius:2px; transition:width .4s; }
.bld-combo {
  position:absolute; top:-9px; right:-6px;
  background:var(--c-gold); color:var(--c-brown);
  font-size:6px; font-weight:bold;
  padding:1px 3px; border-radius:3px;
  animation:pop .25s ease-out;
}
@keyframes pop { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
.bld-ready {
  position:absolute; top:-8px; left:50%; transform:translateX(-50%);
  background:var(--c-green); color:white;
  font-size:7px; padding:1px 4px; border-radius:3px;
  animation:bounce .7s ease-in-out infinite alternate;
}
@keyframes bounce { 0%{transform:translateX(-50%) translateY(0)} 100%{transform:translateX(-50%) translateY(-3px)} }

/* ===== CHARACTER ===== */
.char {
  position: absolute;
  display: flex; flex-direction: column; align-items: center;
  pointer-events: none;
  image-rendering: pixelated;
  transition: left .12s linear, top .12s linear;
}
.char-hat { font-size:12px; line-height:1; }
.char-body {
  width:14px; height:18px;
  border-radius:2px 2px 0 0;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; position:relative;
  border: 1px solid rgba(255,255,255,.2);
}
.char-carry {
  position:absolute; top:-9px; right:-5px;
  font-size:10px;
  animation:cb .4s ease-in-out infinite alternate;
}
@keyframes cb { 0%{transform:translateY(0)} 100%{transform:translateY(-2px)} }
.char-shadow { width:10px; height:3px; background:rgba(0,0,0,.35); border-radius:50%; margin-top:0; }
.char-st {
  font-size:6px; background:rgba(0,0,0,.7);
  padding:1px 3px; border-radius:2px; white-space:nowrap; margin-top:1px;
}

/* ===== PARTICLES ===== */
.ptcl {
  position:fixed; pointer-events:none; z-index:99;
  font-size:11px; font-weight:bold;
  animation:pfloat .9s ease-out forwards;
}
@keyframes pfloat {
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-44px) scale(.7)}
}

/* ===== SLIDE PANEL ===== */
#slide-panel {
  position:fixed; left:48px; top:0; bottom:0;
  width:0; overflow:hidden;
  background: linear-gradient(90deg, var(--c-panel), rgba(26,18,8,.97));
  border-right:2px solid var(--c-border);
  z-index:29;
  transition:width .2s ease;
  display:flex; flex-direction:column;
}
#slide-panel.open { width:170px; }
#sp-inner { padding:6px 5px; overflow-y:auto; flex:1; min-width:170px; }
#sp-inner::-webkit-scrollbar { width:3px; }
#sp-inner::-webkit-scrollbar-thumb { background:var(--c-border-light); border-radius:2px; }
.sp-title {
  font-size:8px; color:var(--c-gold);
  text-transform:uppercase; letter-spacing:1px;
  margin:6px 0 3px; padding-bottom:2px;
  border-bottom:1px solid var(--c-border);
}
.sp-item {
  display:flex; align-items:center; gap:5px;
  padding:6px 5px; border-radius:6px; cursor:pointer;
  transition:background .12s; margin-bottom:1px;
}
.sp-item:hover { background:rgba(255,255,255,.06); }
.sp-item.sel { background:rgba(74,124,47,.2); border:1px solid var(--c-green); }
.sp-item.locked { opacity:.4; }
.sp-icon { font-size:16px; flex-shrink:0; }
.sp-info { flex:1; overflow:hidden; }
.sp-name { font-size:9px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sp-cost { font-size:8px; color:var(--c-gold); }

/* ===== DETAIL PANEL ===== */
#detail-panel {
  position:fixed; bottom:0; left:0; right:0;
  background:linear-gradient(0deg, #0d0800 0%, rgba(26,18,8,.97) 100%);
  border-top:2px solid var(--c-border);
  z-index:28;
  transform:translateY(100%);
  transition:transform .2s ease;
  max-height:42vh;
  display:flex; flex-direction:column;
}
#detail-panel.open { transform:translateY(0); }
#dp-scroll { overflow-y:auto; padding:10px 12px 12px; flex:1; }
#dp-scroll::-webkit-scrollbar { width:3px; }
#dp-scroll::-webkit-scrollbar-thumb { background:var(--c-border-light); }
.dp-head { display:flex; gap:10px; align-items:flex-start; margin-bottom:6px; }
.dp-icon { font-size:30px; flex-shrink:0; }
.dp-name { font-size:14px; font-weight:bold; color:var(--c-gold); margin-bottom:1px; }
.dp-sub { font-size:10px; color:var(--c-green-l); margin-bottom:3px; }
.dp-flavor {
  font-size:9px; color:#c4a882; font-style:italic;
  line-height:1.45; padding:5px 8px;
  background:rgba(255,255,255,.04);
  border-left:2px solid var(--c-border-light);
  border-radius:0 3px 3px 0;
  margin-bottom:7px;
}
.dp-tags { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:7px; }
.dp-tag {
  font-size:8px; padding:2px 6px;
  border-radius:8px;
  background:rgba(74,124,47,.25); border:1px solid var(--c-green);
  color:var(--c-green-l);
}
.dp-tag.gold { background:rgba(212,160,23,.2); border-color:var(--c-gold); color:var(--c-gold); }
.dp-tag.red { background:rgba(192,57,43,.2); border-color:var(--c-red); color:#e74c3c; }
.dp-btns { display:flex; gap:6px; }
.dp-btn {
  flex:1; padding:9px 8px;
  border-radius:8px; font-size:12px; font-weight:bold; cursor:pointer;
  transition:all .12s; border:2px solid;
}
.dp-btn:active { transform:scale(.95); }
.dp-btn.primary { background:linear-gradient(180deg,var(--c-green),#2d4a1e); border-color:var(--c-green-l); color:var(--c-cream); }
.dp-btn.secondary { background:transparent; border-color:var(--c-border); color:#8a7060; }
.dp-btn:disabled { opacity:.4; cursor:not-allowed; }
.dp-close {
  position:absolute; top:6px; right:8px;
  width:24px; height:24px;
  background:var(--c-brown); border:1px solid var(--c-border);
  border-radius:50%; font-size:12px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; color:#8a7060;
}

/* ===== EVENT BANNER ===== */
#banner {
  position:fixed; top:52px; left:50%;
  transform:translateX(-50%);
  background:linear-gradient(90deg, #0d0800, #2d1f10, #0d0800);
  border:2px solid var(--c-gold);
  border-radius:10px; padding:6px 14px;
  font-size:11px; font-weight:bold; color:var(--c-gold);
  text-shadow:0 0 7px rgba(212,160,23,.8);
  z-index:50; opacity:0; pointer-events:none;
  max-width:85vw; text-align:center; white-space:normal;
}
#banner.show { animation:bshow 3s ease forwards; }
@keyframes bshow {
  0%{opacity:0;transform:translateX(-50%) translateY(-8px)}
  12%{opacity:1;transform:translateX(-50%) translateY(0)}
  80%{opacity:1}
  100%{opacity:0;transform:translateX(-50%) translateY(-8px)}
}

/* ===== RESEARCH CARDS ===== */
.rc {
  background:rgba(255,255,255,.04); border:1px solid var(--c-border);
  border-radius:5px; padding:6px; margin-bottom:5px;
}
.rc-h { display:flex; justify-content:space-between; margin-bottom:2px; }
.rc-n { font-size:10px; font-weight:bold; }
.rc-s { font-size:8px; color:var(--c-gold); }
.rc-d { font-size:8px; color:#8a7060; margin-bottom:4px; }
.rc-bar { height:4px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden; margin-bottom:4px; }
.rc-bf { height:100%; background:linear-gradient(90deg, var(--c-blue), var(--c-blue-l)); }
.rc-btn {
  width:100%; padding:4px;
  background:rgba(36,113,163,.2); border:1px solid var(--c-blue);
  border-radius:3px; color:var(--c-blue-l); font-size:9px; cursor:pointer;
}
.rc-btn:disabled { opacity:.4; cursor:not-allowed; }

/* ===== STAFF CARDS ===== */
.sc {
  background:rgba(255,255,255,.04); border:1px solid var(--c-border);
  border-radius:5px; padding:6px; margin-bottom:5px;
  display:flex; align-items:center; gap:7px;
}
.sc-av { font-size:20px; }
.sc-inf { flex:1; }
.sc-n { font-size:10px; font-weight:bold; }
.sc-r { font-size:8px; color:#8a7060; }
.sc-sts { display:flex; gap:4px; margin-top:2px; }
.sc-st { font-size:7px; background:rgba(255,255,255,.06); padding:1px 3px; border-radius:2px; }
.hire-b {
  padding:4px 6px; background:rgba(74,124,47,.3);
  border:1px solid var(--c-green); border-radius:4px;
  color:var(--c-green-l); font-size:9px; cursor:pointer;
  flex-shrink:0;
}
.hire-b:disabled { opacity:.4; cursor:not-allowed; }

/* ===== LOG PANEL ===== */
.log-entry { padding:3px 0; border-bottom:1px solid rgba(255,255,255,.04); font-size:9px; }
.log-day { font-size:7px; color:#8a7060; }

/* ===== RECIPE CARDS ===== */
.recipe-card {
  background:rgba(255,255,255,.04); border:1px solid var(--c-border);
  border-radius:5px; padding:6px; margin-bottom:5px;
}
.recipe-name { font-size:10px; font-weight:bold; color:var(--c-gold); margin-bottom:2px; }
.recipe-ing { font-size:8px; color:#8a7060; margin-bottom:4px; }
.recipe-eff { font-size:8px; color:var(--c-green-l); }

/* ===== WEATHER BADGE ===== */
#weather-badge {
  position:fixed; top:4px; right:4px;
  font-size:9px; background:rgba(0,0,0,.6);
  border:1px solid var(--c-border); border-radius:5px;
  padding:2px 5px; z-index:26; color:#c4a882;
}

/* ===== SAVE INDICATOR ===== */
#save-ind {
  position:fixed; top:4px; right:70px;
  font-size:8px; color:#8a7060;
  z-index:26; opacity:0; transition:opacity .5s;
}
#save-ind.show { opacity:1; }
</style>
</head>
<body>
<div id="app">
  <div id="menu-bar">
    <div class="mb-btn" data-tab="build" onclick="tabClick('build')">🏗️<span class="mb-sub">建設</span></div>
    <div class="mb-btn" data-tab="research" onclick="tabClick('research')">🔬<span class="mb-sub">研究</span></div>
    <div class="mb-btn" data-tab="staff" onclick="tabClick('staff')">👤<span class="mb-sub">人員</span></div>
    <div class="mb-sep"></div>
    <div class="mb-btn" data-tab="kitchen" onclick="tabClick('kitchen')">👩‍🍳<span class="mb-sub">料理</span></div>
    <div class="mb-btn" data-tab="log" onclick="tabClick('log')">📋<span class="mb-sub">ログ</span></div>
    <div class="mb-sep"></div>
    <div class="mb-btn" onclick="manualSave()" title="セーブ">💾<span class="mb-sub">保存</span></div>
    <div class="mb-btn" id="tool-remove-btn" onclick="toggleRemoveTool()" title="撤去">🗑️<span class="mb-sub">撤去</span></div>
  </div>
  <div id="main-col">
    <div id="header">
      <div class="hstat"><span class="hstat-l">資金</span><span class="hstat-v" id="h-money">¥1,000</span></div>
      <div id="header-title">🍄 霧雨魔法キノコ園</div>
      <div class="hstat"><span class="hstat-l">日付</span><span class="hstat-v b" id="h-date">1年1日</span></div>
    </div>
    <div id="iso-vp">
      <div id="iso-stage"></div>
    </div>
  </div>
</div>

<!-- Slide panel -->
<div id="slide-panel"><div id="sp-inner"></div></div>

<!-- Detail panel -->
<div id="detail-panel">
  <button class="dp-close" onclick="closeDetail()">✕</button>
  <div id="dp-scroll"></div>
</div>

<!-- Banner -->
<div id="banner"></div>
<div id="weather-badge">☀️ 晴れ</div>
<div id="save-ind">💾 保存済み</div>

<script>
'use strict';
// ======================================================
// DATA
// ======================================================
const TW=60, TH=30, TD=18, COLS=12, ROWS=10;

const MUSHROOMS = [
  {id:'normal',   name:'ふつうのキノコ', icon:'🍄', growTime:20, yield:60,  wilts:0,  desc:'全ステータスが平均的な標準キノコ。まずはここから始めるべきだぜ。', cost:40, color:'#8b5e3c'},
  {id:'moko',     name:'もこもこキノコ', icon:'🟤', growTime:10, yield:40,  wilts:0,  desc:'成長が早く、枯れにくい。初心者の味方だ。手数で稼ぐタイプだぜ。', cost:35, color:'#7a5030'},
  {id:'shittori', name:'しっとりキノコ', icon:'💧', growTime:22, yield:80,  wilts:0,  desc:'湿度が大好き。水路の隣に置くと収穫量が1.5倍になるぞ。', cost:60, color:'#3a6080'},
  {id:'tsuyatsuya',name:'つやつやキノコ',icon:'✨', growTime:28, yield:130, wilts:0,  desc:'見た目が良く売値が高い高級品。里のお金持ちに大人気だぜ。', cost:90, color:'#7a6030'},
  {id:'chibi',    name:'ちびキノコ群生', icon:'🟢', growTime:15, yield:50,  wilts:0,  desc:'1マスに群生する密集型。収穫数が3倍になる特殊な菌類だぜ。', cost:55, color:'#2a5020'},
  {id:'nobisugi', name:'のびすぎキノコ', icon:'🌿', growTime:18, yield:55,  wilts:0,  desc:'縦に伸びすぎて笑える形をしている。見た人の満足度が上がるぞ。', cost:50, color:'#3a6020'},
  {id:'korokoro', name:'ころころキノコ', icon:'🟡', growTime:16, yield:65,  wilts:0,  desc:'ころころ転がりそうな愛らしい形。客を引き寄せる不思議な魅力がある。', cost:60, color:'#806020'},
  {id:'subesube', name:'すべすべキノコ', icon:'🍚', growTime:20, yield:70,  wilts:0,  desc:'表面がツルツルで料理用に最適。キッチンで調理すると満足度が大幅UP。', cost:65, color:'#6a5a40'},
  {id:'zarazara', name:'ざらざらキノコ', icon:'🟫', growTime:25, yield:60,  wilts:0,  desc:'ザラザラした食感が乾燥に向く。乾燥機に入れると価値が2倍になるぞ。', cost:55, color:'#5a4030'},
  {id:'dekame',   name:'でかめキノコ',   icon:'🎪', growTime:60, yield:350, wilts:0,  desc:'超希少種。収穫は非常に遅いが単価が段違いに高い夢の一品だ！', cost:200, color:'#6a3060'},
  {id:'hyoro',    name:'ひょろキノコ',   icon:'🌱', growTime:6,  yield:35,  wilts:15, desc:'爆速で育つが放置するとすぐ枯れる。素早い収穫が肝心だぜ！', cost:30, color:'#2a6020'},
  {id:'kasahiro', name:'かさ広キノコ',   icon:'☂️',  growTime:32, yield:100, wilts:0,  desc:'傘が広がった映え重視のキノコ。観光客の満足度を大きく引き上げる。', cost:120, color:'#4a3080'},
];

const BUILDINGS = {
  // infra
  path:{id:'path',cat:'infra',name:'土の道',icon:'🟫',cost:20,flavor:'踏み固めた土道だ。従業員が道を好んで通るようになり、移動効率が上がる。',effects:['従業員移動速度×1.5'],combos:['shelf','collection_box'],color:'#5c4030',buildTime:0,w:1,h:1},

// Build grid walk map
function rebuildWalkMap(){
  G.gridWalk = Array.from({length:ROWS}, ()=>Array(COLS).fill(0));
  G.placed.forEach(p=>{
    if(!p.active && BUILDINGS[p.bldId]?.buildTime > 0) return;
    const b = BUILDINGS[p.bldId];
    if(!b) return;
    if(b.id === 'path') G.gridWalk[p.row][p.col] = 1;
    else if(b.id !== 'collection_box' && b.id !== 'bench' && !b.isShelf && !b.isDropoff)
      G.gridWalk[p.row][p.col] = 2;
    // shelves are walkable (for harvesting)
    // collection_box is walkable (for dropoff)
  });
}

// ======================================================
// PATHFINDING (Dijkstra, road preference)
// ======================================================
function findPath(sc, sr, ec, er){
  if(sc===ec && sr===er) return [];
  const key=(c,r)=>r*COLS+c;
  const INF=1e9;
  const dist=Array(ROWS*COLS).fill(INF);
  const prev=Array(ROWS*COLS).fill(-1);
  const visited=new Uint8Array(ROWS*COLS);
  const sk=key(sc,sr);
  dist[sk]=0;
  // Simple priority queue via array (small grid, ok)
  const pq=[[0,sc,sr]]; // [cost, col, row]
  const DIRS=[[0,1],[0,-1],[1,0],[-1,0]];
  while(pq.length){
    pq.sort((a,b)=>a[0]-b[0]);
    const [d,c,r]=pq.shift();
    const k=key(c,r);
    if(visited[k]) continue;
    visited[k]=1;
    if(c===ec && r===er) break;
    for(const [dc,dr] of DIRS){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nc>=COLS||nr<0||nr>=ROWS) continue;
      const nk=key(nc,nr);
      if(visited[nk]) continue;
      // Cost: road=1, empty=3, blocked=999 (unless target)
      const cellType = G.gridWalk[nr]?.[nc] ?? 2;
      const isTarget = nc===ec && nr===er;
      let cost = cellType===1 ? 1 : cellType===2 && !isTarget ? 999 : 3;
      const nd=d+cost;
      if(nd<dist[nk]){
        dist[nk]=nd;
        prev[nk]=k;
        pq.push([nd,nc,nr]);
      }
    }
  }
  // Reconstruct path
  const ek=key(ec,er);
  if(dist[ek]===INF) return null; // unreachable
  const path=[];
  let cur=ek;
  while(cur!==sk){
    const r2=Math.floor(cur/COLS), c2=cur%COLS;
    path.unshift([c2,r2]);
    cur=prev[cur];
    if(cur<0) return null;
  }
  return path;
}

// ======================================================
// ISO RENDERING
// ======================================================
let stageX=0, stageY=0, stageScale=1;

function isoPos(c,r){
  return {x:(c-r)*(TW/2), y:(c+r)*(TH/2)};
}

function initViewport(){
  const vp=document.getElementById('iso-vp');
  const vpW=vp.clientWidth, vpH=vp.clientHeight;
  // Center the grid
  const gridW=(COLS+ROWS)*(TW/2);
  const gridH=(COLS+ROWS)*(TH/2)+TD;
  stageX = vpW/2;
  stageY = vpH*0.15;
  applyStageTransform();
}

function applyStageTransform(){
  document.getElementById('iso-stage').style.transform=
    `translate(${stageX}px,${stageY}px) scale(${stageScale})`;
}

const tileEls={}; // 'c,r' -> {el, top, left, right}

function buildGrid(){
  const stage=document.getElementById('iso-stage');
  stage.innerHTML='';
  Object.keys(tileEls).forEach(k=>delete tileEls[k]);
  // Render in diagonal order
  for(let sum=0;sum<COLS+ROWS-1;sum++){
    for(let c=0;c<COLS;c++){
      const r=sum-c;
      if(r<0||r>=ROWS) continue;
      buildTile(c,r,stage);
    }
  }
}

function buildTile(c,r,stage){
  const {x,y}=isoPos(c,r);
  const el=document.createElement('div');
  el.className='t';
  el.style.cssText=`left:${x-TW/2}px;top:${y-TH/2}px;width:${TW}px;height:${TH+TD}px;z-index:${(c+r)*3};`;

  const top=document.createElement('div');
  top.className='t-top';
  top.style.cssText=`width:${TW}px;height:${TH}px;background:#2a1e10;top:0;left:0;`;

  const left=document.createElement('div');
  left.className='t-left';
  left.style.cssText=`width:${TW/2}px;height:${TD}px;background:#1a1008;top:${TH/2}px;left:0;clip-path:none;`;

  const right=document.createElement('div');
  right.className='t-right';
  right.style.cssText=`width:${TW/2}px;height:${TD}px;background:#150d06;top:${TH/2}px;left:${TW/2}px;clip-path:none;`;

  el.appendChild(top);
  el.appendChild(left);
  el.appendChild(right);
  el.addEventListener('pointerdown', ()=>onTileTap(c,r));
  stage.appendChild(el);
  tileEls[`${c},${r}`]={el,top,left,right};
}

function getTileEl(c,r){ return tileEls[`${c},${r}`]; }

function setTileColor(c,r,color){
  const t=getTileEl(c,r);
  if(t) t.top.style.background=color;
}
function resetTileColor(c,r){
  setTileColor(c,r,'#2a1e10');
}

function renderBuilding(p){
  const bld=BUILDINGS[p.bldId];
  if(!bld) return;
  const {x,y}=isoPos(p.col,p.row);
  const stage=document.getElementById('iso-stage');
  const el=document.createElement('div');
  el.className='bld';
  el.id=`bld-${p.uid}`;
  el.style.cssText=`left:${x}px;top:${y-TH/2-34}px;z-index:${(p.col+p.row)*3+1};width:${TW}px;transform:translateX(-50%);`;

  const body=document.createElement('div');
  body.className='bld-body';
  body.style.cssText=`width:${TW-6}px;height:34px;background:linear-gradient(180deg,${bld.color}dd,${bld.color}88);`;
  body.textContent=bld.icon;

  const name=document.createElement('div');
  name.className='bld-name';
  name.textContent=bld.name;

  const pb=document.createElement('div');
  pb.className='bld-pb';
  const pf=document.createElement('div');
  pf.className='bld-pf';
  pf.style.cssText=`width:${p.active?100:0}%;background:${p.active?'linear-gradient(90deg,#4a7c2f,#7ab648)':'linear-gradient(90deg,#6b4226,#a0623a)'};`;
  pb.appendChild(pf);

  const comboEl=document.createElement('div');
  comboEl.className='bld-combo';
  comboEl.style.display='none';

  const readyEl=document.createElement('div');
  readyEl.className='bld-ready';
  readyEl.textContent='収穫可!';
  readyEl.style.display='none';

  body.appendChild(comboEl);
  body.appendChild(readyEl);
  el.appendChild(body);
  el.appendChild(name);
  el.appendChild(pb);
  stage.appendChild(el);

  p.el=el;
  p.progressEl=pf;
  p.comboEl=comboEl;
  p.readyEl=readyEl;
  p.nameEl=name;

  setTileColor(p.col,p.row,bld.color);
}

function updateShelfDisplay(p){
  if(!p.el || !p.mushroomId) return;
  const m=MUSHROOMS.find(m=>m.id===p.mushroomId);
  if(!m) return;
  const body=p.el.querySelector('.bld-body');
  if(body) body.textContent=p.hasYield ? m.icon : (p.active ? m.icon : BUILDINGS[p.bldId].icon);
  if(p.readyEl) p.readyEl.style.display = p.hasYield ? 'block' : 'none';
}

// ======================================================
// PLACEMENT
// ======================================================
function onTileTap(c,r){
  if(G.removeTool){
    doRemove(c,r);
    return;
  }
  const existing=getPlacedAt(c,r);
  if(existing){
    showPlacedDetail(existing);
    return;
  }
  if(G.selectedBldId){
    doPlace(G.selectedBldId, c, r);
  }
}

function getPlacedAt(c,r){
  return G.placed.find(p=>p.col===c&&p.row===r);
}

function doPlace(bldId, c, r){
  const bld=BUILDINGS[bldId];
  if(!bld){ showBanner('⚠️ 不明な建物だ！'); return; }
  if(G.money < bld.cost){ showBanner('💰 資金が足りない！'); return; }
  if(getPlacedAt(c,r)){ showBanner('⚠️ 既に建物がある！'); return; }
  if(bld.unlockResearch && !RESEARCH.find(r2=>r2.id===bld.unlockResearch&&r2.done)){
    showBanner('🔬 先に研究を完了させてくれ！'); return;
  }
  G.money -= bld.cost;
  const p={
    uid:G.nextUid++, bldId, col:c, row:r,
    buildProg:0, yieldProg:0, hasYield:false,
    harvestTime:0, // when harvested (for freshness)
    active: bld.buildTime === 0,
    mushroomId: null,
    el:null, progressEl:null, comboEl:null, readyEl:null, nameEl:null,
  };
  G.placed.push(p);
  renderBuilding(p);
  rebuildWalkMap();
  updateCombos();
  updateUI();
  addLog(`🏗️ ${bld.name} を (${c},${r}) に建設`);
  if(bld.isShelf) openMushroomSelect(p.uid);
  else showBanner(`🏗️ ${bld.name} を配置した！`);
}

function doRemove(c,r){
  const idx=G.placed.findIndex(p=>p.col===c&&p.row===r);
  if(idx<0) return;
  const p=G.placed[idx];
  const bld=BUILDINGS[p.bldId];
  G.money += Math.floor(bld.cost*0.5);
  p.el?.remove();
  G.placed.splice(idx,1);
  resetTileColor(c,r);
  rebuildWalkMap();
  updateCombos();
  updateUI();
  addLog(`🗑️ ${bld.name} を撤去 (50%返金)`);
  showBanner(`🗑️ ${bld.name} を撤去`);
}

function openMushroomSelect(uid){
  // Show mushroom selection in detail panel
  const p=G.placed.find(p=>p.uid===uid);
  if(!p) return;
  showMushroomSelectDetail(p);
}

// ======================================================
// COMBO SYSTEM
// ======================================================
function getAdj(c,r){
  return [[c-1,r],[c+1,r],[c,r-1],[c,r+1]]
    .map(([cc,rr])=>getPlacedAt(cc,rr))
    .filter(Boolean);
}

function updateCombos(){
  G.placed.forEach(p=>{
    const bld=BUILDINGS[p.bldId];
    if(!bld?.combos?.length){ p.comboEl&&(p.comboEl.style.display='none'); return; }
    const adj=getAdj(p.col,p.row);
    const hits=adj.filter(a=>bld.combos.includes(a.bldId));
    if(hits.length && p.comboEl){
      const hb=BUILDINGS[hits[0].bldId];
      p.comboEl.textContent=`⚡${hb.icon}相性◎`;
      p.comboEl.style.display='block';
    } else if(p.comboEl){
      p.comboEl.style.display='none';
    }
  });
}

function getComboMult(p, type){
  const bld=BUILDINGS[p.bldId];
  if(!bld) return 1;
  const adj=getAdj(p.col,p.row);
  let mult=1;
  adj.forEach(a=>{
    if(a.bldId==='water' && a.active){
      if(type==='grow') mult*=(1+(BUILDINGS.water.adjGrow||0));
      if(type==='yield' && p.mushroomId==='shittori') mult*=1.5;
    }
    if(a.bldId==='magic_lamp' && a.active){
      if(type==='value') mult*=(1+(BUILDINGS.magic_lamp.adjValue||0));
    }
  });
  if(RESEARCH.find(r=>r.id==='magic1'&&r.done)) mult*=1.2; // combo boost
  return mult;
}

// ======================================================
// YIELD SYSTEM
// ======================================================
function updateYields(){
  const TICK_S = TICK_MS/1000;
  G.placed.forEach(p=>{
    const bld=BUILDINGS[p.bldId];
    if(!bld) return;
    // Build progress
    if(!p.active && bld.buildTime>0){
      p.buildProg+=100/(bld.buildTime*(1000/TICK_MS));
      if(p.progressEl) p.progressEl.style.width=Math.min(100,p.buildProg)+'%';
      if(p.buildProg>=100){
        p.active=true;
        p.buildProg=100;
        if(p.progressEl){ p.progressEl.style.width='100%'; p.progressEl.style.background='linear-gradient(90deg,#4a7c2f,#7ab648)'; }
        addLog(`✅ ${bld.name} 完成！`);
        showBanner(`✅ ${bld.name} が完成した！`);
        rebuildWalkMap();
        if(bld.isShelf) openMushroomSelect(p.uid);
      }
      return;
    }
    if(!bld.isShelf || !p.mushroomId || p.hasYield) return;
    const m=MUSHROOMS.find(m=>m.id===p.mushroomId);
    if(!m) return;

    let speed=100/(m.growTime*(1000/TICK_MS));
    speed*=getComboMult(p,'grow');
    if(G.weather==='rain') speed*=1.3;
    if(G.weather==='storm') speed*=0.5;
    if(RESEARCH.find(r=>r.id==='agri1'&&r.done)) speed*=1.1;
    if(G.placed.some(pp=>pp.bldId==='greenhouse'&&pp.active)) speed*=1.15;

    p.yieldProg+=speed;
    if(p.progressEl){ p.progressEl.style.width=Math.min(100,p.yieldProg)+'%'; p.progressEl.style.background='linear-gradient(90deg,#d4a017,#f5e6c8)'; }

    if(p.yieldProg>=100){
      p.hasYield=true;
      p.yieldProg=0;
      p.harvestTime=Date.now();
      updateShelfDisplay(p);
      showBanner(`🍄 ${m.name} が収穫できる！`);
    }

    // Wilt
    if(m.wilts && p.hasYield){
      // handled in wilts check
    }
  });

  // Wilt check for hyoro
  G.placed.forEach(p=>{
    if(!p.mushroomId || !p.hasYield) return;
    const m=MUSHROOMS.find(m=>m.id===p.mushroomId);
    if(!m?.wilts) return;
    const age=(Date.now()-p.harvestTime)/1000;
    if(age>m.wilts){
      p.hasYield=false;
      p.yieldProg=0;
      updateShelfDisplay(p);
      addLog(`💀 ${m.name} が枯れた…`);
    }
  });
}

function initStaff(){
  STAFF_DATA.filter(sd=>sd.hired).forEach(sd=>spawnStaff(sd));
}

function spawnStaff(sd){
  const ns={
    id:G.nextUid++,
    staffId:sd.id,
    x:0, y:0, // stage coords
    col:Math.floor(COLS/2), row:Math.floor(ROWS/2), // grid position (float)
    path:[], pathIdx:0,
    state:'idle', // idle, move, work, carry, rest
    target:null, // placed uid
    carry:null,  // {mushroomId, amount, freshness}
    fatigue:0,
    el:null, bodyEl:null, statusEl:null, carryEl:null,
  };
  // Initial screen pos
  const {x,y}=isoPos(ns.col,ns.row);
  ns.x=x; ns.y=y;
  G.staff.push(ns);
  renderChar(ns, sd);
}

function renderChar(s, sd){
  const stage=document.getElementById('iso-stage');
  const el=document.createElement('div');
  el.className='char';
  el.id=`char-${s.id}`;
  el.style.cssText=`left:${s.x}px;top:${s.y-30}px;z-index:200;`;
  el.innerHTML=`
    <span class="char-hat">${sd.hat}</span>
    <div class="char-body" style="background:${sd.bodyColor}"></div>
    <div class="char-shadow"></div>
    <div class="char-st">待機中</div>
  `;
  stage.appendChild(el);
  s.el=el;
  s.bodyEl=el.querySelector('.char-body');
  s.statusEl=el.querySelector('.char-st');
}

function updateStaff(){
  G.staff.forEach(s=>{
    const sd=STAFF_DATA.find(d=>d.id===s.staffId);
    if(!sd) return;
    s.fatigue=Math.min(100,s.fatigue+0.2);

    if(s.fatigue>=85 && s.state!=='rest'){
      const bench=G.placed.find(p=>p.bldId==='bench'&&p.active);
      if(bench){
        s.state='rest';
        s.target=bench.uid;
        s.path=findPathToPlaced(s,bench)||[];
        s.pathIdx=0;
        setStatus(s,'休憩へ💤');
      }
    }

    switch(s.state){
      case 'idle': aiIdle(s,sd); break;
      case 'move': aiMove(s,sd); break;
      case 'work': aiWork(s,sd); break;
      case 'carry': aiCarry(s,sd); break;
      case 'rest': aiRest(s,sd); break;
    }
    updateCharPos(s);
  });
}

function aiIdle(s,sd){
  // Find ready shelf
  const readyShelf=G.placed.find(p=>{
    const b=BUILDINGS[p.bldId];
    return b?.isShelf && p.hasYield && p.active;
  });
  if(readyShelf){
    const path=findPathToPlaced(s,readyShelf);
    if(path){
      s.state='move';
      s.target=readyShelf.uid;
      s.path=path;
      s.pathIdx=0;
      setStatus(s,'収穫へ🍄');
    }
    return;
  }
  // Find kitchen with queued items if staff has nothing
  const kitchen=G.placed.find(p=>p.bldId==='kitchen'&&p.active&&G.kitchen.some(k=>k.done));
  if(kitchen){
    const path=findPathToPlaced(s,kitchen);
    if(path){
      s.state='move';
      s.target=kitchen.uid;
      s.path=path;
      s.pathIdx=0;
      setStatus(s,'キッチンへ🍳');
    }
  }
}

function findPathToPlaced(s,p){
  const sc=Math.round(s.col), sr=Math.round(s.row);
  return findPath(sc,sr,p.col,p.row);
}

function aiMove(s,sd){
  if(!s.path||s.pathIdx>=s.path.length){
    // Arrived
    const tgt=G.placed.find(p=>p.uid===s.target);
    if(!tgt){ s.state='idle'; return; }
    const bld=BUILDINGS[tgt.bldId];
    if(bld?.isShelf && tgt.hasYield){
      s.state='work';
      setStatus(s,'作業中⛏️');
    } else if(bld?.isDropoff){
      // Sell
      doSell(s);
      s.state='idle';
    } else if(bld?.bldId==='bench'){
      s.state='rest';
    } else if(bld?.isKitchen){
      // Pick up cooked food
      const cooked=G.kitchen.find(k=>k.done);
      if(cooked){
        s.carry={mushroomId:'cooked',amount:cooked.money,freshness:1,icon:cooked.icon,isCookedFood:true,satisfaction:cooked.satisfaction};
        G.kitchen.splice(G.kitchen.indexOf(cooked),1);
        updateCarryDisplay(s);
        // Now go to dropoff
        const dropoff=G.placed.find(p=>BUILDINGS[p.bldId]?.isDropoff&&p.active);
        if(dropoff){
          s.path=findPathToPlaced(s,dropoff)||[];
          s.pathIdx=0;
          s.target=dropoff.uid;
          s.state='carry';
          setStatus(s,'運搬中📦');
        } else s.state='idle';
      } else s.state='idle';
    } else {
      s.state='idle';
    }
    return;
  }
  // Move along path
  const [nc,nr]=s.path[s.pathIdx];
  const {x:tx,y:ty}=isoPos(nc,nr);
  const dx=tx-s.x, dy=ty-s.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const spd=STAFF_DATA.find(d=>d.id===s.staffId)?.speed||1;
  const roadBoost=G.gridWalk[Math.round(s.row)]?.[Math.round(s.col)]===1?1.5:1;
  const researchBoost=RESEARCH.find(r=>r.id==='route1'&&r.done)?1.15:1;
  const speed=spd*3*roadBoost*researchBoost;
  if(dist<speed){
    s.x=tx; s.y=ty; s.col=nc; s.row=nr;
    s.pathIdx++;
  } else {
    s.x+=dx/dist*speed;
    s.y+=dy/dist*speed;
    s.col+=((nc-s.col)/dist*speed)/(TW/2);
    s.row+=((nr-s.row)/dist*speed)/(TH/2);
  }
}

function aiWork(s,sd){
  // Harvest the shelf
  const tgt=G.placed.find(p=>p.uid===s.target);
  if(!tgt||!tgt.hasYield){ s.state='idle'; return; }
  // Harvest
  const m=MUSHROOMS.find(m=>m.id===tgt.mushroomId);
  if(!m){ s.state='idle'; return; }
  let amt=m.yield;
  if(m.id==='chibi') amt*=3;
  amt=Math.floor(amt*getComboMult(tgt,'yield'));
  if(RESEARCH.find(r=>r.id==='bio1'&&r.done)) amt=Math.floor(amt*1.15);
  const freshness=(1000-Math.min(1000,Date.now()-tgt.harvestTime))/1000;
  tgt.hasYield=false;
  tgt.yieldProg=0;
  updateShelfDisplay(tgt);
  if(tgt.progressEl) tgt.progressEl.style.width='0%';

  // Check if kitchen available and mushroom is kitchen-type
  const kitchenBuilt=G.placed.find(p=>p.bldId==='kitchen'&&p.active);
  const hasRecipe=RECIPES.find(rec=>rec.ingredients.includes(m.id)&&(!rec.unlockResearch||RESEARCH.find(r=>r.id===rec.unlockResearch&&r.done)));
  if(kitchenBuilt && hasRecipe && Math.random()<0.6){
    // Send to kitchen
    G.kitchen.push({
      mushroomId:m.id, cookProg:0,
      recipeId:hasRecipe.id, cookTime:hasRecipe.cookTime,
      money:hasRecipe.money, icon:hasRecipe.icon,
      satisfaction:hasRecipe.satisfaction, done:false,
      freshness
    });
    s.carry=null;
    s.state='idle';
    addLog(`👩‍🍳 ${m.name} をキッチンへ送った`);
  } else {
    s.carry={mushroomId:m.id, amount:amt, freshness, icon:m.icon};
    updateCarryDisplay(s);
    // Find dropoff
    const dropoff=G.placed.find(p=>BUILDINGS[p.bldId]?.isDropoff&&p.active);
    if(dropoff){
      s.path=findPathToPlaced(s,dropoff)||[];
      s.pathIdx=0;
      s.target=dropoff.uid;
      s.state='carry';
      setStatus(s,'運搬中📦');
    } else {
      doSell(s);
      s.state='idle';
    }
  }
}

function aiCarry(s,sd){
  aiMove(s,sd); // same movement logic, arrival handled in aiMove
}

function aiRest(s,sd){
  s.fatigue=Math.max(0,s.fatigue-1.5);
  const teaAdj=G.placed.some(p=>p.bldId==='teahouse'&&p.active&&Math.abs(p.col-s.col)<3);
  if(teaAdj) s.fatigue=Math.max(0,s.fatigue-0.5);
  if(s.fatigue<15){
    s.state='idle';
    setStatus(s,'待機中');
  } else {
    // Move toward bench
    if(s.path?.length && s.pathIdx<s.path.length) aiMove(s,sd);
  }
}

function doSell(s){
  if(!s.carry) return;
  let amt=s.carry.amount;
  if(s.carry.isCookedFood){
    G.satisfaction=Math.min(100,G.satisfaction+(s.carry.satisfaction||0));
  }
  // Collection box fee 5%
  if(G.placed.some(p=>BUILDINGS[p.bldId]?.isDropoff&&p.active)){
    amt=Math.floor(amt*0.95);
  }
  G.money+=amt;
  G.totalEarned+=amt;
  G.stats = G.stats||{};
  spawnParticle(s.x+stageX,s.y+stageY-30,`+¥${amt}`,'#d4a017');
  addLog(`💰 ${STAFF_DATA.find(d=>d.id===s.staffId)?.name} が ¥${amt} 換金`);
  s.carry=null;
  updateCarryDisplay(s);
  updateUI();
}

function updateCarryDisplay(s){
  if(!s.el) return;
  let ce=s.el.querySelector('.char-carry');
  if(s.carry){
    if(!ce){ ce=document.createElement('span'); ce.className='char-carry'; s.bodyEl?.appendChild(ce); }
    ce.textContent=s.carry.icon;
  } else if(ce) ce.remove();
}

function setStatus(s,text){
  if(s.statusEl) s.statusEl.textContent=text;
}

function updateCharPos(s){
  if(!s.el) return;
  s.el.style.left=s.x+'px';
  s.el.style.top=(s.y-30)+'px';
  s.el.style.zIndex=Math.round((s.col+s.row)*3+2);
}

// ======================================================
function updateKitchen(){
  G.kitchen.forEach(k=>{
    if(k.done) return;
    k.cookProg+=100/(k.cookTime*(1000/TICK_MS));
    if(k.cookProg>=100){
      k.done=true;
      // Freshness bonus
      const bonus=k.freshness>0.8?1.3:k.freshness>0.5?1.1:1.0;
      k.money=Math.floor(k.money*bonus);
      if(RESEARCH.find(r=>r.id==='culinary1'&&r.done)) k.money=Math.floor(k.money*1.25);
      addLog(`🍳 ${RECIPES.find(r=>r.id===k.recipeId)?.name||'料理'} 完成！(¥${k.money})`);
      showBanner(`🍳 料理完成！ ¥${k.money}`);
    }
  });
}

// DAY / WEATHER / EVENTS
// ======================================================
const TICK_MS=400;

function dayTick(){
  G.tick++;
  const dayLen=90000/TICK_MS; // 90 seconds = 1 day
  if(G.tick%dayLen===0){
    G.day++;
    if(G.day>30){ G.day=1; G.year++; }
    let rp=G.rpPerDay;
    if(G.placed.some(p=>p.bldId==='lab'&&p.active)) rp+=6;
    if(G.placed.some(p=>p.bldId==='teahouse'&&p.active)) rp+=3;
    G.rp+=rp;
    G.satisfaction=Math.max(0,G.satisfaction-2);
    if(G.placed.some(p=>p.bldId==='teahouse'&&p.active)) G.satisfaction=Math.min(100,G.satisfaction+10);
    if(G.placed.some(p=>p.bldId==='bench'&&p.active)) G.satisfaction=Math.min(100,G.satisfaction+5);
    // Tourist revenue
    if(G.satisfaction>30){
      const rev=Math.floor(G.satisfaction*(RESEARCH.find(r=>r.id==='social1'&&r.done)?1.2:1)*2);
      if(rev>0){ G.money+=rev; addLog(`👘 観光収益 +¥${rev}`); }
    }
    // Random event
    G.weatherTick++;
    if(G.weatherTick>2+Math.floor(Math.random()*3)){
      G.weatherTick=0;
      changeWeather();
    }
    if(Math.random()<0.07) triggerEvent();
    // Auto staff salary
    G.staff.forEach(s=>{
      const sd=STAFF_DATA.find(d=>d.id===s.staffId);
      if(sd?.salary>0){ G.money=Math.max(0,G.money-sd.salary); addLog(`💸 ${sd.name} 給料 ¥${sd.salary}`); }
    });
    updateUI();
  }
}

function changeWeather(){
  const opts=['sunny','sunny','sunny','rain','fog','storm'];
  const prev=G.weather;
  G.weather=opts[Math.floor(Math.random()*opts.length)];
  const map={sunny:'☀️ 晴れ',rain:'🌧️ 雨',fog:'🌫️ 霧',storm:'⛈️ 嵐'};
  document.getElementById('weather-badge').textContent=map[G.weather];
  if(G.weather!==prev) showBanner(`${map[G.weather]} 天気が変わった！`);
}

const EVENTS=[
  {banner:'💥 マスタースパーク！ 焼きキノコ大量発生！',fn:()=>{ G.money+=600; spawnParticle(window.innerWidth/2,window.innerHeight/2,'焼きキノコ+¥600','#d4a017'); }},
  {banner:'🌫️ 幻想郷の霧！ 全キノコが急成長！',fn:()=>{ G.placed.filter(p=>BUILDINGS[p.bldId]?.isShelf&&p.active&&p.mushroomId).forEach(p=>{ p.yieldProg=Math.min(100,p.yieldProg+40); }); }},
  {banner:'👘 観光客殺到！ 満足度UP！',fn:()=>{ G.satisfaction=Math.min(100,G.satisfaction+20); G.money+=G.satisfaction*3; }},
  {banner:'🧬 突然変異！ ランダムなキノコが超成長！',fn:()=>{ const s=G.placed.filter(p=>BUILDINGS[p.bldId]?.isShelf&&p.active); if(s.length){ s[Math.floor(Math.random()*s.length)].yieldProg=100; } }},

function triggerEvent(){

// ======================================================
// SWIPE HARVEST
// ======================================================
let swipeSet=new Set();
let isSwiping=false;

document.addEventListener('pointerdown',(e)=>{
  isSwiping=true; swipeSet.clear();
  checkSwipeHarvest(e);
});
document.addEventListener('pointermove',(e)=>{ if(isSwiping) checkSwipeHarvest(e); });
document.addEventListener('pointerup',()=>{ isSwiping=false; swipeSet.clear(); });

function checkSwipeHarvest(e){
  const el=document.elementFromPoint(e.clientX,e.clientY);
  if(!el) return;
  const tile=el.closest('.t');
  if(!tile) return;
  // Get col/row from tile
  // Find tile el
  for(const [key,t] of Object.entries(tileEls)){
    if(t.el===tile){
      const [c,r]=key.split(',').map(Number);
      const p=getPlacedAt(c,r);
      if(p && BUILDINGS[p.bldId]?.isShelf && p.hasYield && !swipeSet.has(p.uid)){
        swipeSet.add(p.uid);
        playerHarvest(p,e.clientX,e.clientY);
      }
      break;
    }
  }
}

function playerHarvest(p,px,py){
  if(!p.hasYield) return;
  const m=MUSHROOMS.find(m=>m.id===p.mushroomId);
  if(!m) return;
  let amt=m.yield;
  if(m.id==='chibi') amt*=3;
  amt=Math.floor(amt*getComboMult(p,'yield'));
  if(RESEARCH.find(r=>r.id==='bio1'&&r.done)) amt=Math.floor(amt*1.15);
  G.money+=amt;
  G.totalEarned+=amt;
  p.hasYield=false; p.yieldProg=0;
  updateShelfDisplay(p);
  if(p.progressEl) p.progressEl.style.width='0%';
  spawnParticle(px,py-20,`+¥${amt}`,'#d4a017');
  spawnParticle(px+15,py-35,`${m.icon}`,'#7ab648');
  updateUI();
  addLog(`✋ ${m.name} を手動収穫 +¥${amt}`);
}

function showPlacedDetail(p){

  const combos=G.placed.filter(other=>{

  const dp=document.getElementById('detail-panel');
  const scroll=document.getElementById('dp-scroll');
  scroll.innerHTML=`
    <div class="dp-head">
      <span class="dp-icon">${m?m.icon:bld.icon}</span>
      <div>
        <div class="dp-name">${bld.name}</div>
        <div class="dp-sub">状態: ${p.active?'稼働中✅':'建設中🔨'} | 位置:(${p.col},${p.row})</div>
      </div>
    </div>
    ${m?`<div class="dp-flavor">"${m.desc}"</div>`:`<div class="dp-flavor">"${bld.flavor}"</div>`}
    ${m?`<div class="dp-tags">
      <span class="dp-tag">🍄 ${m.name}</span>
      <span class="dp-tag">成長: ${Math.floor(p.yieldProg)}%</span>
      ${p.hasYield?'<span class="dp-tag" style="background:rgba(74,124,47,.4)">✅ 収穫可！</span>':''}
    </div>`:''}
    ${combos.length?`<div class="dp-tags">${combos.map(c=>`<span class="dp-tag gold">⚡ ${BUILDINGS[c.bldId].icon}${BUILDINGS[c.bldId].name}</span>`).join('')}</div>`:''}
    <div class="dp-btns">
      ${bld.isShelf?`<button class="dp-btn primary" onclick="openMushroomSelect(${p.uid})">🌱 キノコ変更</button>`:''}

    </div>
  `;

}

// ======================================================
// UI: RESEARCH PANEL
// ======================================================
function renderResearchPanel(inner){
  let html=`<div class="sp-title">研究P: ${Math.floor(G.rp)} RP</div>`;
  RESEARCH.forEach(r=>{
    const pct=Math.min(100,r.prog/r.rp*100);
    html+=`<div class="rc">
      <div class="rc-h"><span class="rc-n">${r.done?'✅ ':''} ${r.name}</span><span class="rc-s">${r.done?'完了':Math.floor(pct)+'%'}</span></div>
      <div class="rc-d">${r.effect}</div>
      <div class="rc-bar"><div class="rc-bf" style="width:${pct}%"></div></div>
      ${!r.done?`<button class="rc-btn" onclick="investRP('${r.id}')" ${G.rp<25?'disabled':''}>RP 25 投入 (残${Math.ceil((r.rp-r.prog)/25)}回)</button>`:''}
    </div>`;
  });
  inner.innerHTML=html;
}

function investRP(id){
  const r=RESEARCH.find(r=>r.id===id);
  if(!r||r.done||G.rp<25) return;
  G.rp-=25; r.prog+=25;
  if(r.prog>=r.rp){ r.done=true; r.prog=r.rp; showBanner(`✅ 研究完了: ${r.name}！`); addLog(`🔬 研究完了: ${r.name}`); }
  renderResearchPanel(document.getElementById('sp-inner'));
  updateUI();
}

// ======================================================
// UI: STAFF PANEL
// ======================================================
function renderStaffPanel(inner){
  let html='<div class="sp-title">人員管理</div>';
  STAFF_DATA.forEach(sd=>{
    const active=G.staff.find(s=>s.staffId===sd.id);
    const fatigue=active?Math.floor(active.fatigue):0;
    html+=`<div class="sc">
      <span class="sc-av">${sd.hat}</span>
      <div class="sc-inf">
        <div class="sc-n">${sd.name}</div>
        <div class="sc-r">${sd.role}</div>
        <div class="sc-sts">
          <span class="sc-st">速${sd.speed}</span>
          <span class="sc-st">運${sd.carry}</span>
          <span class="sc-st">魔${sd.magic}</span>
        </div>
        ${active?`<div style="font-size:7px;color:#8a7060;margin-top:2px">疲労:${fatigue}% | ${active.statusEl?.textContent||'?'}</div>`:''}
      </div>
      ${sd.salary>0?
        `<button class="hire-b" onclick="hireStaff('${sd.id}')" ${active?'disabled':''}>
          ${active?'雇用済':'¥'+sd.salary+'/日'}
        </button>`:
        `<span style="font-size:8px;color:var(--c-gold)">オーナー</span>`}
    </div>`;
  });
  inner.innerHTML=html;
}

function hireStaff(id){
  const sd=STAFF_DATA.find(d=>d.id===id);
  if(!sd||G.money<sd.salary*2){ showBanner('💰 資金不足！'); return; }
  G.money-=sd.salary*2; // 2 days up front
  sd.hired=true;
  const ns={
    id:G.nextUid++, staffId:id,
    x:0,y:0, col:Math.floor(COLS/2)+1, row:Math.floor(ROWS/2),
    path:[], pathIdx:0,
    state:'idle', target:null, carry:null, fatigue:0,
    el:null,bodyEl:null,statusEl:null,carryEl:null,
  };
  const {x,y}=isoPos(ns.col,ns.row);
  ns.x=x; ns.y=y;
  G.staff.push(ns);
  renderChar(ns,sd);
  addLog(`👤 ${sd.name} を雇用`);
  showBanner(`👤 ${sd.name} が加わった！`);
  renderStaffPanel(document.getElementById('sp-inner'));
  updateUI();
}

// ======================================================
// UI: KITCHEN PANEL
// ======================================================
function renderKitchenPanel(inner){
  let html=`<div class="sp-title">料理キュー</div>`;
  if(!G.kitchen.length){
    html+='<div style="font-size:9px;color:#8a7060;padding:6px">キノコを収穫すると自動でキッチンへ。</div>';
  }
  G.kitchen.forEach((k,i)=>{
    const rec=RECIPES.find(r=>r.id===k.recipeId);
    const pct=Math.min(100,k.cookProg);
    html+=`<div class="recipe-card">
      <div class="recipe-name">${k.icon} ${rec?.name||'料理中'} ${k.done?'✅':''}</div>
      <div class="recipe-ing">調理進捗: ${Math.floor(pct)}%</div>
      <div class="rc-bar"><div class="rc-bf" style="width:${pct}%"></div></div>
      <div class="recipe-eff">¥${k.money} 鮮度: ${Math.floor(k.freshness*100)}%</div>
    </div>`;
  });
  html+=`<div class="sp-title">解放済みレシピ</div>`;
  RECIPES.filter(r=>!r.unlockResearch||RESEARCH.find(rr=>rr.id===r.unlockResearch&&rr.done)).forEach(r=>{
    html+=`<div class="recipe-card">
      <div class="recipe-name">${r.icon} ${r.name}</div>
      <div class="recipe-ing">材料: ${r.ingredients.map(id=>MUSHROOMS.find(m=>m.id===id)?.name||id).join('、')}</div>
      <div class="recipe-eff">¥${r.money} | 満足+${r.satisfaction} | 調理${r.cookTime}秒</div>
    </div>`;
  });
  inner.innerHTML=html;
}

function showBanner(text){

// ======================================================
// PAN & ZOOM
// ======================================================
let panStart=null, panSX=0, panSY=0;
let pinchDist0=0, pinchScale0=1;

const vp=document.getElementById('iso-vp');

vp.addEventListener('pointerdown',(e)=>{
  if(e.target.closest('.t')||e.target.closest('.bld')||e.target.closest('.char')) return;
  panStart={x:e.clientX,y:e.clientY};
  panSX=stageX; panSY=stageY;
},{passive:true});

vp.addEventListener('pointermove',(e)=>{
  if(!panStart) return;
  stageX=panSX+(e.clientX-panStart.x);
  stageY=panSY+(e.clientY-panStart.y);
  applyStageTransform();
},{passive:true});

vp.addEventListener('pointerup',()=>panStart=null);

vp.addEventListener('touchstart',(e)=>{
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    pinchDist0=Math.sqrt(dx*dx+dy*dy);
    pinchScale0=stageScale;
  }
},{passive:true});

vp.addEventListener('touchmove',(e)=>{
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    stageScale=Math.max(0.5,Math.min(2.0,pinchScale0*(dist/pinchDist0)));
    applyStageTransform();
  }
},{passive:true});

// ======================================================
// SAVE / LOAD
// ======================================================
function serializeState(){
  return {
    money:G.money, day:G.day, year:G.year, rp:G.rp,
    satisfaction:G.satisfaction, totalEarned:G.totalEarned,
    placed:G.placed.map(p=>({uid:p.uid,bldId:p.bldId,col:p.col,row:p.row,mushroomId:p.mushroomId,active:p.active,buildProg:p.buildProg})),
    nextUid:G.nextUid,
    research:RESEARCH.map(r=>({id:r.id,done:r.done,prog:r.prog})),
    staff:STAFF_DATA.map(sd=>({id:sd.id,hired:sd.hired})),
    log:G.log.slice(0,15),
  };
}

function loadState(data){
  if(!data) return;
  G.money=data.money||1000;
  G.day=data.day||1; G.year=data.year||1;
  G.rp=data.rp||0; G.satisfaction=data.satisfaction||40;
  G.totalEarned=data.totalEarned||0;
  G.nextUid=data.nextUid||1;
  G.log=data.log||[];
  data.research?.forEach(r=>{
    const rr=RESEARCH.find(x=>x.id===r.id);
    if(rr){ rr.done=r.done; rr.prog=r.prog; }
  });
  data.staff?.forEach(sd=>{ const d=STAFF_DATA.find(x=>x.id===sd.id); if(d) d.hired=sd.hired; });
  data.placed?.forEach(p=>{
    const pp={
      uid:p.uid||G.nextUid++, bldId:p.bldId, col:p.col, row:p.row,
      mushroomId:p.mushroomId||null, active:p.active, buildProg:p.buildProg||100,
      yieldProg:0, hasYield:false, harvestTime:0,
      el:null, progressEl:null, comboEl:null, readyEl:null, nameEl:null,
    };
    G.placed.push(pp);
    renderBuilding(pp);
    if(pp.mushroomId) updateShelfDisplay(pp);
  });
  rebuildWalkMap();
  updateCombos();
}

function manualSave(){
  localStorage.setItem('kinoko_save',JSON.stringify(serializeState()));
  const el=document.getElementById('save-ind');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
  addLog('💾 手動セーブ');
}

function autoSave(){
  G.saveTick++;
  if(G.saveTick%(30000/TICK_MS)===0){
    localStorage.setItem('kinoko_save',JSON.stringify(serializeState()));
  }
}

// ======================================================
// STARTER SETUP
// ======================================================
function starterSetup(){
  doPlace('shelf',3,3);
  doPlace('collection_box',5,4);
  doPlace('path',4,3);
  doPlace('path',4,4);
  doPlace('water',2,3);
  // Assign mushroom to first shelf
  const shelf=G.placed.find(p=>p.bldId==='shelf');
  if(shelf){ shelf.mushroomId='normal'; updateShelfDisplay(shelf); }
  updateCombos();
  addLog('🌿 霧雨魔法キノコ園 開業！');
}

// ======================================================
// MAIN LOOP
// ======================================================
function gameLoop(){
  updateYields();
  updateStaff();
  updateKitchen();
  dayTick();
  autoSave();
}

// ======================================================
// INIT
// ======================================================
function init(){
  initViewport();
  buildGrid();
  const saved=localStorage.getItem('kinoko_save');
  if(saved){
    try{
      loadState(JSON.parse(saved));
      showBanner('💾 セーブデータを読み込んだ！');
    }catch(e){
      starterSetup();
    }
  } else {
    starterSetup();
  }
  initStaff();
  updateUI();
  setInterval(gameLoop, TICK_MS);
  setTimeout(()=>showBanner('🍄 霧雨魔法キノコ園へようこそ！左メニューから建設を始めよう！'),800);
}

window.addEventListener('resize',()=>{ initViewport(); });
window.addEventListener('load',init);
</script>
