<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>霧雨魔法キノコ園 v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1a1208;--panel:#221810;--bdr:#6b4226;--bdrl:#a0623a;
  --cream:#f5e6c8;--gold:#d4a017;--grn:#4a7c2f;--grnl:#7ab648;
  --brn:#3d2b1f;--brnm:#5c3d2e;--red:#c0392b;--blu:#2471a3;--blul:#5dade2;
}
html,body{height:100%;overflow:hidden;background:var(--bg);
  font-family:'Courier New',monospace;color:var(--cream);
  user-select:none;image-rendering:pixelated}
#app{display:flex;height:100dvh;overflow:hidden}

/* ── MENU BAR ─────────────────── */
#mb{width:48px;flex-shrink:0;background:linear-gradient(180deg,#0d0800,var(--panel));
  border-right:2px solid var(--bdr);display:flex;flex-direction:column;
  align-items:center;padding:5px 0;gap:3px;z-index:30;overflow:hidden}
.mbb{width:40px;height:40px;flex-shrink:0;
  background:linear-gradient(180deg,var(--brnm),var(--brn));
  border:2px solid var(--bdr);border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:17px;cursor:pointer;transition:all .12s}
.mbb .s{font-size:6px;color:#8a7060;margin-top:1px}
.mbb.active{border-color:var(--gold);background:linear-gradient(180deg,#4a3820,#2d2010);
  box-shadow:0 0 6px rgba(212,160,23,.4)}
.mbb:active{transform:scale(.88)}
.mbsep{width:30px;height:1px;background:var(--bdr);flex-shrink:0;margin:2px 0}

/* ── MAIN COLUMN ──────────────── */
#mc{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── HEADER ───────────────────── */
#hdr{background:linear-gradient(180deg,#0d0800,var(--panel));
  border-bottom:2px solid var(--bdr);padding:4px 8px;
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;position:relative;z-index:25}
#hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  animation:shimmer 2.5s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.hs{display:flex;flex-direction:column;align-items:center;min-width:60px}
.hsl{font-size:7px;color:#8a7060;text-transform:uppercase;letter-spacing:.5px}
.hsv{font-size:13px;font-weight:bold;color:var(--gold)}
.hsv.b{color:var(--blul)}.hsv.g{color:var(--grnl)}
#htitle{font-size:10px;color:var(--cream);opacity:.8;text-align:center}
#hrp{font-size:8px;color:#8a7060;text-align:center;margin-top:1px}

/* ── ISO VIEWPORT ─────────────── */
#vp{flex:1;overflow:hidden;position:relative;touch-action:none;
  background:radial-gradient(ellipse at 45% 30%,rgba(60,100,30,.15) 0%,transparent 65%),var(--bg)}
#st{position:absolute;transform-origin:0 0}

/* ── ISO TILES ────────────────── */
.t{position:absolute;cursor:pointer}
.tf{position:absolute;inset:0;pointer-events:none}
.tt{clip-path:polygon(50% 0%,100% 31.25%,50% 62.5%,0% 31.25%);transition:filter .1s}
.tl{clip-path:polygon(0% 31.25%,50% 62.5%,50% 100%,0% 68.75%)}
.tr{clip-path:polygon(50% 62.5%,100% 31.25%,100% 68.75%,50% 100%)}
.t:hover .tt{filter:brightness(1.3)}
.t.hi .tt{filter:brightness(1.5)}

/* ── BUILDING SPRITE ──────────── */
.bld{position:absolute;display:flex;flex-direction:column;align-items:center;
  pointer-events:none;image-rendering:pixelated}
.bb{border:1px solid rgba(255,255,255,.15);border-radius:2px;
  display:flex;align-items:center;justify-content:center;position:relative}
.bico{font-size:18px;display:block;pointer-events:none}
.bnm{font-size:6px;color:var(--cream);background:rgba(0,0,0,.65);
  padding:1px 3px;border-radius:2px;white-space:nowrap;
  max-width:58px;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.bpb{width:26px;height:3px;background:rgba(0,0,0,.5);border-radius:2px;overflow:hidden;margin-top:1px}
.bpf{height:100%;border-radius:2px;transition:width .4s}
.bco{position:absolute;top:-9px;right:-6px;
  background:var(--gold);color:var(--brn);
  font-size:6px;font-weight:bold;padding:1px 3px;border-radius:3px;
  animation:cpop .25s ease-out}
@keyframes cpop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.brd{position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  background:var(--grn);color:#fff;font-size:7px;padding:1px 4px;border-radius:3px;
  animation:rbounce .7s ease-in-out infinite alternate}
@keyframes rbounce{0%{transform:translateX(-50%) translateY(0)}100%{transform:translateX(-50%) translateY(-3px)}}

/* ── CHARACTER ────────────────── */
.ch{position:absolute;display:flex;flex-direction:column;align-items:center;
  pointer-events:none;image-rendering:pixelated;
  transition:left .09s linear,top .09s linear}
.chat{font-size:11px;line-height:1}
.chb{width:14px;height:18px;border-radius:2px 2px 0 0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;position:relative;border:1px solid rgba(255,255,255,.2)}
.chc{position:absolute;top:-9px;right:-5px;font-size:10px;
  animation:cbob .45s ease-in-out infinite alternate}
@keyframes cbob{0%{transform:translateY(0)}100%{transform:translateY(-2px)}}
.chsh{width:10px;height:3px;background:rgba(0,0,0,.35);border-radius:50%}
.chst{font-size:6px;background:rgba(0,0,0,.7);padding:1px 3px;border-radius:2px;white-space:nowrap;margin-top:1px}

/* ── PARTICLES ────────────────── */
.ptcl{position:fixed;pointer-events:none;z-index:99;
  font-size:11px;font-weight:bold;animation:pfloat .9s ease-out forwards}
@keyframes pfloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-44px) scale(.7)}}

/* ── SLIDE PANEL ──────────────── */
#sp{position:fixed;left:48px;top:0;bottom:0;width:0;overflow:hidden;
  background:linear-gradient(90deg,var(--panel),rgba(26,18,8,.97));
  border-right:2px solid var(--bdr);z-index:29;transition:width .2s ease;
  display:flex;flex-direction:column}
#sp.open{width:168px}
#spi{padding:6px 5px;overflow-y:auto;flex:1;min-width:168px}
#spi::-webkit-scrollbar{width:3px}
#spi::-webkit-scrollbar-thumb{background:var(--bdrl);border-radius:2px}
.spt{font-size:8px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;
  margin:6px 0 3px;padding-bottom:2px;border-bottom:1px solid var(--bdr)}
.spi{display:flex;align-items:center;gap:5px;padding:5px;
  border-radius:6px;cursor:pointer;transition:background .12s;margin-bottom:1px}
.spi:hover{background:rgba(255,255,255,.06)}
.spi.sel{background:rgba(74,124,47,.2);border:1px solid var(--grn)}
.spi.lk{opacity:.4;pointer-events:none}
.spico{font-size:16px;flex-shrink:0}
.spinf{flex:1;overflow:hidden}
.spn{font-size:9px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spc{font-size:8px;color:var(--gold)}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.mitem{padding:4px;border-radius:5px;cursor:pointer;
  background:rgba(255,255,255,.04);border:1px solid var(--bdr);transition:background .12s}
.mitem:hover{background:rgba(74,124,47,.2)}
.mitem.sel{background:rgba(74,124,47,.25);border-color:var(--grn)}

/* ── DETAIL PANEL ─────────────── */
#dp{position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,#0d0800,rgba(26,18,8,.98));
  border-top:2px solid var(--bdr);z-index:28;
  transform:translateY(100%);transition:transform .2s ease;
  max-height:43vh;display:flex;flex-direction:column}
#dp.open{transform:translateY(0)}
#dps{overflow-y:auto;padding:9px 12px 12px;flex:1}
#dps::-webkit-scrollbar{width:3px}
#dps::-webkit-scrollbar-thumb{background:var(--bdrl)}
.dphd{display:flex;gap:10px;align-items:flex-start;margin-bottom:5px}
.dpico{font-size:28px;flex-shrink:0}
.dpnm{font-size:14px;font-weight:bold;color:var(--gold);margin-bottom:1px}
.dpsub{font-size:10px;color:var(--grnl)}
.dpfl{font-size:9px;color:#c4a882;font-style:italic;line-height:1.45;
  padding:5px 8px;background:rgba(255,255,255,.04);
  border-left:2px solid var(--bdrl);border-radius:0 3px 3px 0;margin:5px 0 7px}
.dptags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px}
.dptag{font-size:8px;padding:2px 6px;border-radius:8px;
  background:rgba(74,124,47,.25);border:1px solid var(--grn);color:var(--grnl)}
.dptag.g{background:rgba(212,160,23,.2);border-color:var(--gold);color:var(--gold)}
.dptag.r{background:rgba(192,57,43,.2);border-color:var(--red);color:#e74c3c}
.dpbtns{display:flex;gap:5px}
.dpbtn{flex:1;padding:9px 6px;border-radius:8px;font-size:12px;font-weight:bold;
  cursor:pointer;transition:all .12s;border:2px solid}
.dpbtn:active{transform:scale(.95)}
.dpbtn.p{background:linear-gradient(180deg,var(--grn),#2d4a1e);border-color:var(--grnl);color:var(--cream)}
.dpbtn.s{background:transparent;border-color:var(--bdr);color:#8a7060}
.dpbtn:disabled{opacity:.4;cursor:not-allowed}
.dpcls{position:absolute;top:5px;right:7px;width:22px;height:22px;
  background:var(--brn);border:1px solid var(--bdr);border-radius:50%;
  font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#8a7060;z-index:1}

/* ── CARDS ────────────────────── */
.card{background:rgba(255,255,255,.04);border:1px solid var(--bdr);
  border-radius:5px;padding:6px;margin-bottom:5px}
.cardh{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.cardn{font-size:10px;font-weight:bold}
.cards{font-size:8px;color:var(--gold)}
.cardd{font-size:8px;color:#8a7060;margin-bottom:4px;line-height:1.35}
.bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-bottom:4px}
.barf{height:100%;background:linear-gradient(90deg,var(--blu),var(--blul))}
.barf.g{background:linear-gradient(90deg,var(--grn),var(--grnl))}
.minibtn{width:100%;padding:4px;background:rgba(36,113,163,.2);
  border:1px solid var(--blu);border-radius:3px;color:var(--blul);font-size:9px;cursor:pointer}
.minibtn:disabled{opacity:.4;cursor:not-allowed}
.minibtn.g{background:rgba(74,124,47,.2);border-color:var(--grn);color:var(--grnl)}
.scwrap{display:flex;align-items:center;gap:7px}
.scav{font-size:20px}.scnm{font-size:10px;font-weight:bold}
.scrl{font-size:8px;color:#8a7060}
.scsts{display:flex;gap:4px;margin-top:2px}
.scst{font-size:7px;background:rgba(255,255,255,.06);padding:1px 3px;border-radius:2px}

/* ── BANNER ───────────────────── */
#bnr{position:fixed;top:54px;left:50%;transform:translateX(-50%);
  background:linear-gradient(90deg,#0d0800,#2d1f10,#0d0800);
  border:2px solid var(--gold);border-radius:10px;padding:6px 14px;
  font-size:11px;font-weight:bold;color:var(--gold);
  text-shadow:0 0 7px rgba(212,160,23,.8);z-index:50;opacity:0;pointer-events:none;
  max-width:86vw;text-align:center}
#bnr.show{animation:bshow 3.2s ease forwards}
@keyframes bshow{
  0%{opacity:0;transform:translateX(-50%) translateY(-8px)}
  12%{opacity:1;transform:translateX(-50%) translateY(0)}
  78%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-8px)}}

#wbdg{position:fixed;top:4px;right:4px;font-size:9px;
  background:rgba(0,0,0,.6);border:1px solid var(--bdr);
  border-radius:5px;padding:2px 5px;z-index:26;color:#c4a882}
#sind{position:fixed;top:4px;right:70px;font-size:8px;color:#8a7060;
  z-index:26;opacity:0;transition:opacity .5s}
#sind.show{opacity:1}
.logent{padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:9px;line-height:1.4}
.logd{font-size:7px;color:#8a7060}
</style>
</head>
<body>
<div id="app">
  <div id="mb">
    <div class="mbb" data-tab="build"    onclick="tabClick('build')">🏗️<span class="s">建設</span></div>
    <div class="mbb" data-tab="research" onclick="tabClick('research')">🔬<span class="s">研究</span></div>
    <div class="mbb" data-tab="staff"    onclick="tabClick('staff')">👤<span class="s">人員</span></div>
    <div class="mbsep"></div>
    <div class="mbb" data-tab="kitchen"  onclick="tabClick('kitchen')">🍳<span class="s">料理</span></div>
    <div class="mbb" data-tab="log"      onclick="tabClick('log')">📋<span class="s">ログ</span></div>
    <div class="mbsep"></div>
    <div class="mbb" id="brm" onclick="toggleRm()">🗑️<span class="s">撤去</span></div>
    <div class="mbb" onclick="manualSave()">💾<span class="s">保存</span></div>
  </div>
  <div id="mc">
    <div id="hdr">
      <div class="hs"><span class="hsl">資金</span><span class="hsv" id="hmoney">¥1,000</span></div>
      <div><div id="htitle">🍄 霧雨魔法キノコ園</div><div id="hrp">RP:0 | 満足:40%</div></div>
      <div class="hs"><span class="hsl">日付</span><span class="hsv b" id="hdate">1年1日</span></div>
    </div>
    <div id="vp"><div id="st"></div></div>
  </div>
</div>
<div id="sp"><div id="spi"></div></div>
<div id="dp">
  <button class="dpcls" onclick="closeDP()">✕</button>
  <div id="dps"></div>
</div>
<div id="bnr"></div>
<div id="wbdg">☀️ 晴れ</div>
<div id="sind">💾 保存済み</div>

<script>
'use strict';
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const TW=60,TH=30,TD=18,TILE_H=TH+TD,COLS=12,ROWS=10;
const TICK_MS=100,GAME_TICKS=5;
const gTPS=1000/TICK_MS/GAME_TICKS; // game-logic ticks per real second = 2
const DAY_GTICKS=180; // 180 game ticks = 90 real seconds

// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
const MSH=[
  {id:'normal',    name:'ふつうのキノコ',  ico:'🍄', cost:40,  gt:20, yld:60,  w:0,  col:'#8b5e3c'},
  {id:'moko',      name:'もこもこキノコ',  ico:'🟤', cost:35,  gt:10, yld:40,  w:0,  col:'#7a5030'},
  {id:'shittori',  name:'しっとりキノコ',  ico:'💧', cost:60,  gt:22, yld:80,  w:0,  col:'#3a6080'},
  {id:'tsuyatsuya',name:'つやつやキノコ',  ico:'✨', cost:90,  gt:28, yld:130, w:0,  col:'#7a6030'},
  {id:'chibi',     name:'ちびキノコ群生',  ico:'🟢', cost:55,  gt:15, yld:50,  w:0,  col:'#2a5020', multi:3},
  {id:'nobisugi',  name:'のびすぎキノコ',  ico:'🌿', cost:50,  gt:18, yld:55,  w:0,  col:'#3a6020', sat:8},
  {id:'korokoro',  name:'ころころキノコ',  ico:'🟡', cost:60,  gt:16, yld:65,  w:0,  col:'#806020', attract:true},
  {id:'subesube',  name:'すべすべキノコ',  ico:'🍚', cost:65,  gt:20, yld:70,  w:0,  col:'#6a5a40', kitchen:true},
  {id:'zarazara',  name:'ざらざらキノコ',  ico:'🟫', cost:55,  gt:25, yld:60,  w:0,  col:'#5a4030'},
  {id:'dekame',    name:'でかめキノコ',    ico:'🎪', cost:200, gt:60, yld:350, w:0,  col:'#6a3060'},
  {id:'hyoro',     name:'ひょろキノコ',    ico:'🌱', cost:30,  gt:6,  yld:35,  w:15, col:'#2a6020'},
  {id:'kasahiro',  name:'かさ広キノコ',    ico:'☂️', cost:120, gt:32, yld:100, w:0,  col:'#4a3080', tour:12},
];
const MDESC={
  normal:'全ステータスが平均的な標準キノコ。まずはここから始めるべきだぜ。',
  moko:'成長が早く、枯れにくい。初心者の味方。手数で稼ぐタイプだぜ。',
  shittori:'湿度が大好き。水路の隣に置くと収穫量が1.5倍になるぞ。',
  tsuyatsuya:'見た目が良く売値が高い高級品。里のお金持ちに大人気だぜ。',
  chibi:'1マスに群生する密集型。収穫数が3倍になる特殊な菌類だぜ。',
  nobisugi:'縦に伸びすぎて笑える形をしている。見た人の満足度が上がるぞ。',
  korokoro:'ころころ転がりそうな愛らしい形。客を引き寄せる不思議な魅力がある。',
  subesube:'表面がツルツルで料理用に最適。キッチンで調理すると満足度が大幅UP。',
  zarazara:'ザラザラした食感が乾燥に向く。乾燥機の隣だと価値が2倍になるぞ。',
  dekame:'超希少種。収穫は非常に遅いが単価が段違いに高い夢の一品だ！',
  hyoro:'爆速で育つが放置するとすぐ枯れる。素早い収穫が肝心だぜ！',
  kasahiro:'傘が広がった映え重視のキノコ。観光客の満足度を大きく引き上げる。',
};

const BLD={
  path:{id:'path',cat:'infra',name:'土の道',ico:'🟫',cost:20,
    fl:'踏み固めた土道だ。従業員が道を好んで通るようになり移動効率が上がる。',
    eff:['従業員移動速度×1.5(道優先)'],cb:['shelf','collection_box'],
    col:'#5c4030',bt:0,isPath:true},
  water:{id:'water',cat:'infra',name:'湧き水の水路',ico:'💧',cost:180,
    fl:'冷たい水はキノコの故郷。隣接した棚の成長速度を20%上げる魔法のインフラだ。',
    eff:['隣接棚 成長速度+20%','しっとりキノコ 収穫量×1.5'],cb:['shelf'],
    col:'#1a3a5a',bt:10,adjG:0.2},
  magic_lamp:{id:'magic_lamp',cat:'infra',name:'魔法のランプ',ico:'🪔',cost:250,
    fl:'謎の光を放つ魔法製品。隣接する棚の収益を30%増やすぞ。',
    eff:['隣接棚 収益+30%'],cb:['shelf'],col:'#4a3820',bt:20,adjV:0.3},
  dryer:{id:'dryer',cat:'infra',name:'乾燥機',ico:'🔆',cost:300,
    fl:'ざらざらキノコを乾燥させると価値が2倍になる。電力は私の魔法で補ってやる。',
    eff:['ざらざらキノコ 価値×2.0'],cb:['shelf'],col:'#5a3a20',bt:20},
  shelf:{id:'shelf',cat:'farm',name:'栽培棚 (汎用)',ico:'🪵',cost:100,
    fl:'どんなキノコでも育てられる基本の棚。まずこれがないと始まらないぜ。',
    eff:['キノコ栽培可能','容量:1種'],cb:['water','magic_lamp','path'],
    col:'#7b5e3a',bt:0,isShelf:true},
  collection_box:{id:'collection_box',cat:'facility',name:'魔理沙の集荷箱',ico:'📦',cost:300,
    fl:'ここにキノコを放り込めば、私が責任を持って換金してくるぜ。……少し手数料をもらうがな！',
    eff:['換金拠点(必須)','手数料5%'],cb:['path'],col:'#5a3010',bt:0,isDrop:true},
  bench:{id:'bench',cat:'facility',name:'休憩ベンチ',ico:'🪑',cost:120,
    fl:'従業員が一休みできる場所。疲労回復が早まるぞ。',
    eff:['従業員疲労回復+35%','観光満足+5%'],cb:['path','teahouse'],
    col:'#5c4030',bt:0,isBench:true},
  kitchen:{id:'kitchen',cat:'facility',name:'キノコキッチン',ico:'🍳',cost:500,
    fl:'収穫物を料理に変える魔法の調理場だ！鮮度が高いほど高単価になるぞ。',
    eff:['収穫→料理変換','鮮度ボーナス','レシピ解放可能'],cb:['shelf','collection_box'],

// WALK MAP
// ═══════════════════════════════════════════════
function rebuildWalk(){
  G.gridWalk=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  G.placed.forEach(p=>{
    if(!p.active&&BLD[p.bid]?.bt>0) return;
    const b=BLD[p.bid]; if(!b) return;
    if(b.isPath) G.gridWalk[p.row][p.col]=1;
    else if(!b.isShelf&&!b.isDrop&&!b.isBench&&!b.isKitchen)
      G.gridWalk[p.row][p.col]=2;
  });
}

// ═══════════════════════════════════════════════
// PATHFINDING — Dijkstra, road preference
// ═══════════════════════════════════════════════
function findPath(sc,sr,ec,er){
  if(sc===ec&&sr===er) return [];
  const key=(c,r)=>r*COLS+c;
  const N=ROWS*COLS;
  const dist=new Float32Array(N).fill(1e9);
  const prev=new Int16Array(N).fill(-1);
  const vis=new Uint8Array(N);
  dist[key(sc,sr)]=0;
  const pq=[[0,sc,sr]];
  const D4=[[0,1],[0,-1],[1,0],[-1,0]];
  while(pq.length){
    pq.sort((a,b)=>a[0]-b[0]);
    const [d,c,r]=pq.shift();
    const k=key(c,r);
    if(vis[k]) continue; vis[k]=1;
    if(c===ec&&r===er) break;
    for(const[dc,dr]of D4){
      const nc=c+dc,nr=r+dr;
      if(nc<0||nc>=COLS||nr<0||nr>=ROWS) continue;
      const nk=key(nc,nr); if(vis[nk]) continue;
      const ct=G.gridWalk[nr]?.[nc]??2;
      const isTarget=nc===ec&&nr===er;
      const cost=ct===1?1:ct===2&&!isTarget?999:3;
      const nd=d+cost;
      if(nd<dist[nk]){dist[nk]=nd;prev[nk]=k;pq.push([nd,nc,nr]);}
    }
  }
  const ek=key(ec,er);
  if(dist[ek]>=1e9) return null;
  const path=[];
  let cur=ek;
  while(cur!==key(sc,sr)){
    path.unshift([cur%COLS,Math.floor(cur/COLS)]);
    cur=prev[cur]; if(cur<0) return null;
  }
  return path;
}

function buildGrid(){

}

function getAt(c,r){return G.placed.find(p=>p.col===c&&p.row===r);}

function onTap(c,r){
  if(G.removeTool){doRemove(c,r);return;}
  const ex=getAt(c,r);
  if(ex){showPlacedDP(ex);return;}
  if(G.selBldId) doPlace(G.selBldId,c,r);
}

function doPlace(bid,c,r){
  const b=BLD[bid]; if(!b) return;
  if(G.money<b.cost){showBanner('💰 資金が足りない！');return;}
  if(getAt(c,r)){showBanner('⚠️ 既に建物がある！');return;}
  if(b.unlRes&&!RESEARCH.find(rr=>rr.id===b.unlRes&&rr.done)){showBanner('🔬 先に研究を完了させてくれ！');return;}
  G.money-=b.cost;
  const p={uid:G.nextUid++,bid,col:c,row:r,
    bprog:0,yprog:0,hasYield:false,harvestGt:0,
    active:b.bt===0,mushroomId:null,
    el:null,icoEl:null,pfEl:null,coEl:null,rdEl:null};
  G.placed.push(p); renderBld(p); rebuildWalk(); updCombos();
  updHdrUI(); addLog(`🏗️ ${b.name} を (${c},${r}) に建設`);
  if(b.isShelf){showMshSelectPanel(p.uid);showBanner('🌱 どのキノコを育てるか選ぼう！');}
  else showBanner(`🏗️ ${b.name} を配置！`);
}

function doRemove(c,r){
  const idx=G.placed.findIndex(p=>p.col===c&&p.row===r);
  if(idx<0) return;
  const p=G.placed[idx];
  G.money+=Math.floor(BLD[p.bid].cost*0.5);
  p.el?.remove(); G.placed.splice(idx,1);
  resetTile(c,r); rebuildWalk(); updCombos(); updHdrUI(); closeDP();
  addLog(`🗑️ ${BLD[p.bid].name} 撤去 (50%返金)`);
  showBanner(`🗑️ ${BLD[p.bid].name} を撤去`);
}

// ═══════════════════════════════════════════════
// COMBO SYSTEM
// ═══════════════════════════════════════════════
function adjOf(c,r){
  return[[c-1,r],[c+1,r],[c,r-1],[c,r+1]].map(([cc,rr])=>getAt(cc,rr)).filter(Boolean);
}
function updCombos(){
  G.placed.forEach(p=>{
    const b=BLD[p.bid]; if(!b?.cb?.length){p.coEl&&(p.coEl.style.display='none');return;}
    const hits=adjOf(p.col,p.row).filter(a=>b.cb.includes(a.bid));
    if(hits.length&&p.coEl){const hb=BLD[hits[0].bid];p.coEl.textContent=`⚡${hb.ico}相性◎`;p.coEl.style.display='block';}
    else if(p.coEl) p.coEl.style.display='none';
  });
}
function comboMult(p,type){
  const b=BLD[p.bid]; if(!b) return 1;
  let m=1;
  adjOf(p.col,p.row).forEach(a=>{
    const ab=BLD[a.bid]; if(!a.active||!ab) return;
    if(ab.adjG&&type==='grow') m*=(1+ab.adjG);
    if(ab.adjV&&type==='value') m*=(1+ab.adjV);
    if(ab.id==='water'&&p.mushroomId==='shittori'&&type==='yield') m*=1.5;
    if(ab.id==='dryer'&&p.mushroomId==='zarazara'&&type==='value') m*=2.0;
  });
  if(RESEARCH.find(r=>r.id==='magic1'&&r.done)) m=1+(m-1)*1.2;
  return Math.max(1,m);
}

// ═══════════════════════════════════════════════
// YIELD SYSTEM
// ═══════════════════════════════════════════════
function updateYields(){
  G.placed.forEach(p=>{
    const b=BLD[p.bid]; if(!b) return;
    // Build progress
    if(!p.active&&b.bt>0){
      p.bprog+=100/(b.bt*gTPS);
      if(p.pfEl) p.pfEl.style.width=Math.min(100,p.bprog)+'%';
      if(p.bprog>=100){
        p.active=true;p.bprog=100;
        if(p.pfEl){p.pfEl.style.width='100%';p.pfEl.style.background='linear-gradient(90deg,#4a7c2f,#7ab648)';}
        addLog(`✅ ${b.name} 完成！`);showBanner(`✅ ${b.name} が完成した！`);
        rebuildWalk();if(b.isShelf)showMshSelectPanel(p.uid);
      }
      return;
    }
    if(!b.isShelf||!p.mushroomId||p.hasYield) return;
    const m=MSH.find(m=>m.id===p.mushroomId); if(!m) return;
    let spd=100/(m.gt*gTPS);
    spd*=comboMult(p,'grow');
    const hasGH=G.placed.some(pp=>pp.bid==='greenhouse'&&pp.active);
    if(!hasGH){if(G.weather==='rain')spd*=1.3;if(G.weather==='storm')spd*=0.5;}
    else spd*=1.15;
    if(RESEARCH.find(r=>r.id==='agri1'&&r.done)) spd*=1.1;
    p.yprog+=spd;
    if(p.pfEl){p.pfEl.style.width=Math.min(100,p.yprog)+'%';p.pfEl.style.background='linear-gradient(90deg,#d4a017,#f5e6c8)';}
    if(p.yprog>=100){
      p.hasYield=true;p.yprog=0;p.harvestGt=G.gtick;
      updShelfDisp(p);showBanner(`🍄 ${m.name} が収穫できる！`);
      if(m.sat) G.satisfaction=Math.min(100,G.satisfaction+m.sat);
    }
    // Wilt check
    if(m.w&&p.hasYield){
      const age=(G.gtick-p.harvestGt)/(gTPS);// in seconds
      if(age>m.w){p.hasYield=false;p.yprog=0;updShelfDisp(p);addLog(`💀 ${m.name} が枯れた…`);}
    }
  });
}

function initStaff(){

function spawnCharEl(s,sd){

  st.appendChild(el);
  s.el=el; s.bodyEl=el.querySelector('.chb'); s.stEl=el.querySelector('.chst');
}

function updStaff(){
  G.staff.forEach(s=>{
    const sd=STAFFD.find(d=>d.id===s.sid); if(!sd) return;
    s.fatigue=Math.min(100,s.fatigue+0.05);
    switch(s.state){
      case 'idle': aiIdle(s); break;
      case 'move': aiMove(s,sd); break;
      case 'rest': aiRest(s,sd); break;
    }
    syncCh(s);
  });
}

function gotoP(s,placed,lbl){
  const sc=Math.round(s.col),sr=Math.round(s.row);
  const path=findPath(sc,sr,placed.col,placed.row);
  if(!path) return false;
  s.path=path;s.pi=0;s.tuid=placed.uid;s.state='move';setSt(s,lbl);
  return true;
}

function aiIdle(s){
  if(s.fatigue>=85){
    const bench=G.placed.find(p=>BLD[p.bid]?.isBench&&p.active);
    if(bench){gotoP(s,bench,'休憩へ💤');return;}
    else s.fatigue=0;
  }
  if(G.kitchen.some(k=>k.done)){
    const kitch=G.placed.find(p=>BLD[p.bid]?.isKitchen&&p.active);
    if(kitch){gotoP(s,kitch,'キッチンへ🍳');return;}
  }
  const shelf=G.placed.find(p=>BLD[p.bid]?.isShelf&&p.hasYield&&p.active&&p.mushroomId);
  if(shelf) gotoP(s,shelf,'収穫へ🍄');
}

function aiMove(s,sd){
  // Move step
  if(s.path&&s.pi<s.path.length){
    const spd=getSpd(s,sd);
    const[tc,tr]=s.path[s.pi];
    const dc=tc-s.col,dr=tr-s.row;
    const dist=Math.sqrt(dc*dc+dr*dr);
    if(dist<=spd){s.col=tc;s.row=tr;s.pi++;}
    else{const f=spd/dist;s.col+=dc*f;s.row+=dr*f;}
    return;
  }
  // Arrived
  const tgt=G.placed.find(p=>p.uid===s.tuid);
  if(!tgt){s.state='idle';setSt(s,'待機中');return;}
  const b=BLD[tgt.bid];
  if(b?.isShelf&&tgt.hasYield){harvestShelf(s,tgt);}
  else if(b?.isDrop&&s.carry){doSell(s);s.state='idle';setSt(s,'待機中');}
  else if(b?.isBench){s.state='rest';setSt(s,'休憩中💤');}
  else if(b?.isKitchen){doPickupCooked(s);}
  else{s.state='idle';setSt(s,'待機中');}
}

function aiRest(s,sd){
  // still moving toward bench?
  if(s.path&&s.pi<s.path.length) aiMove(s,sd);
  const bench=G.placed.some(p=>BLD[p.bid]?.isBench&&p.active);
  const tea=G.placed.some(p=>p.bid==='teahouse'&&p.active);
  const rec=0.5+(bench?0.6:0)+(tea?0.4:0);
  s.fatigue=Math.max(0,s.fatigue-rec);
  if(s.fatigue<12){s.state='idle';setSt(s,'待機中');}
}

function getSpd(s,sd){
  const base=0.12*(sd?.spd||1);
  const cr=Math.round(s.col),rr=Math.round(s.row);
  const onRoad=G.gridWalk[rr]?.[cr]===1;
  const rb=onRoad?1.5:1;
  const res=RESEARCH.find(r=>r.id==='route1'&&r.done)?1.15:1;
  return base*rb*res;
}

function harvestShelf(s,tgt){
  const m=MSH.find(m=>m.id===tgt.mushroomId); if(!m){s.state='idle';return;}
  let amt=m.yld*(m.multi||1);
  amt=Math.floor(amt*comboMult(tgt,'value'));
  if(RESEARCH.find(r=>r.id==='bio1'&&r.done)) amt=Math.floor(amt*1.15);
  const freshness=Math.max(0,1-(G.gtick-tgt.harvestGt)*0.02);
  tgt.hasYield=false;tgt.yprog=0;updShelfDisp(tgt);
  if(tgt.pfEl) tgt.pfEl.style.width='0%';
  const kitch=G.placed.find(p=>BLD[p.bid]?.isKitchen&&p.active);
  const rec=RECIPES.find(r=>r.reqs.includes(m.id)&&(!r.unlRes||RESEARCH.find(rr=>rr.id===r.unlRes&&rr.done)));
  if(kitch&&rec&&Math.random()<0.55){
    let cm=rec.m;
    if(freshness>0.8)cm=Math.floor(cm*1.3);else if(freshness>0.5)cm=Math.floor(cm*1.1);
    if(RESEARCH.find(r=>r.id==='culinary1'&&r.done)) cm=Math.floor(cm*1.25);
    G.kitchen.push({mushroomId:m.id,cprog:0,ct:rec.ct,rid:rec.id,money:cm,sat:rec.sat,ico:rec.ico,done:false,fresh:freshness});
    addLog(`👩‍🍳 ${m.name} をキッチンへ`);s.state='idle';
  } else {
    s.carry={ico:m.ico,amt,mid:m.id};updCrry(s);
    const drop=G.placed.find(p=>BLD[p.bid]?.isDrop&&p.active);
    if(drop){
      const sc=Math.round(s.col),sr=Math.round(s.row);
      const path=findPath(sc,sr,drop.col,drop.row)||[];
      s.path=path;s.pi=0;s.tuid=drop.uid;s.state='move';setSt(s,'運搬中📦');
    }else{doSell(s);s.state='idle';}
  }
}

function doPickupCooked(s){
  const ck=G.kitchen.find(k=>k.done);
  if(!ck){s.state='idle';return;}
  s.carry={ico:ck.ico,amt:ck.money,isFood:true,sat:ck.sat};
  G.kitchen.splice(G.kitchen.indexOf(ck),1);
  updCrry(s);
  const drop=G.placed.find(p=>BLD[p.bid]?.isDrop&&p.active);
  if(drop){
    const sc=Math.round(s.col),sr=Math.round(s.row);
    const path=findPath(sc,sr,drop.col,drop.row)||[];
    s.path=path;s.pi=0;s.tuid=drop.uid;s.state='move';setSt(s,'料理運搬中🍱');
  }else{doSell(s);s.state='idle';}
}

function doSell(s){
  if(!s.carry) return;
  let amt=s.carry.amt;
  if(G.placed.some(p=>BLD[p.bid]?.isDrop&&p.active)) amt=Math.floor(amt*0.95);
  if(s.carry.isFood&&s.carry.sat) G.satisfaction=Math.min(100,G.satisfaction+s.carry.sat);
  G.money+=amt;G.totalEarned+=amt;
  const{x,y}=isoPos(s.col,s.row);
  spawnPtcl(sX+x*sScale,sY+(y+TH/2)*sScale,`+¥${amt}`,'#d4a017');
  addLog(`💰 ${STAFFD.find(d=>d.id===s.sid)?.nm} が ¥${amt} 換金`);
  s.carry=null;updCrry(s);updHdrUI();
}

function updCrry(s){
  if(!s.el) return;
  let ce=s.el.querySelector('.chc');
  if(s.carry){if(!ce){ce=document.createElement('span');ce.className='chc';s.bodyEl?.appendChild(ce);}ce.textContent=s.carry.ico;}
  else if(ce) ce.remove();
}
function setSt(s,t){if(s.stEl)s.stEl.textContent=t;}
function syncCh(s){
  if(!s.el) return;
  const{x,y}=isoPos(s.col,s.row);
  s.el.style.left=x+'px';s.el.style.top=(y+TH/2-28)+'px';
  s.el.style.zIndex=Math.round((s.col+s.row)*3+2);
}

// DAY / WEATHER / EVENTS
// ═══════════════════════════════════════════════
function gameDayTick(){
  G.gtick++;
  if(G.gtick%DAY_GTICKS!==0) return;
  G.day++;if(G.day>30){G.day=1;G.year++;}
  // RP
  let rp=3;
  if(G.placed.some(p=>p.bid==='lab'&&p.active)) rp+=6;
  if(G.placed.some(p=>p.bid==='teahouse'&&p.active)) rp+=3;
  G.rp+=rp;
  // Satisfaction
  G.satisfaction=Math.max(0,G.satisfaction-1.5);
  if(G.placed.some(p=>p.bid==='teahouse'&&p.active)) G.satisfaction=Math.min(100,G.satisfaction+10);
  if(G.placed.some(p=>BLD[p.bid]?.isBench&&p.active)) G.satisfaction=Math.min(100,G.satisfaction+4);
  // Tourism
  const kasaBonus=G.placed.filter(p=>p.mushroomId==='kasahiro'&&p.hasYield).length*50;
  const koroBonus=G.placed.filter(p=>p.mushroomId==='korokoro'&&p.hasYield).length*3;
  G.satisfaction=Math.min(100,G.satisfaction+koroBonus);
  let tourRev=Math.floor(G.satisfaction*1.8+kasaBonus);
  if(RESEARCH.find(r=>r.id==='social1'&&r.done)) tourRev=Math.floor(tourRev*1.2);
  if(G.placed.some(p=>p.bid==='teahouse'&&p.active)) tourRev=Math.floor(tourRev*1.2);
  if(tourRev>0){G.money+=tourRev;addLog(`👘 観光収益 +¥${tourRev}`);}
  // Staff salary
  G.staff.forEach(s=>{const sd=STAFFD.find(d=>d.id===s.sid);if(sd?.sal>0){G.money=Math.max(0,G.money-sd.sal);addLog(`💸 ${sd.nm} 給料 ¥${sd.sal}`);}});
  // Weather
  G.wtick++;
  if(G.wtick>=3+Math.floor(Math.random()*4)){G.wtick=0;chgWeather();}
  if(Math.random()<0.06) trigEvt();
  updHdrUI();
  if(G.activeTab==='log') renderLog(document.getElementById('spi'));
}

function chgWeather(){
  const opts=['sunny','sunny','sunny','rain','fog','storm'];
  const prev=G.weather;
  G.weather=opts[Math.floor(Math.random()*opts.length)];
  const wm={sunny:'☀️ 晴れ',rain:'🌧️ 雨',fog:'🌫️ 霧',storm:'⛈️ 嵐'};
  document.getElementById('wbdg').textContent=wm[G.weather];
  if(G.weather!==prev) showBanner(wm[G.weather]+' 天気が変わった！');
}

const EVTS=[
  {b:'💥 マスタースパーク！ 焼きキノコ大量発生！',fn:()=>{G.money+=700;spawnPtcl(window.innerWidth*.5,window.innerHeight*.4,'焼き+¥700','#d4a017');addLog('💥 マスタースパーク！+¥700');}},
  {b:'🌫️ 幻想郷の霧！ 全キノコが急成長！',fn:()=>{G.placed.filter(p=>BLD[p.bid]?.isShelf&&p.active&&p.mushroomId).forEach(p=>p.yprog=Math.min(100,p.yprog+45));}},
  {b:'👘 観光客殺到！ 大繁盛だぜ！',fn:()=>{const r=Math.floor(G.satisfaction*4+200);G.money+=r;G.satisfaction=Math.min(100,G.satisfaction+15);addLog(`👘 観光客殺到 +¥${r}`);}},
  {b:'🧬 突然変異！ ランダムな棚が超成長！',fn:()=>{const ss=G.placed.filter(p=>BLD[p.bid]?.isShelf&&p.active&&p.mushroomId);if(ss.length)ss[Math.floor(Math.random()*ss.length)].yprog=100;}},

let swActive=false,swSet=new Set();
document.addEventListener('pointerdown',e=>{swActive=true;swSet.clear();tryHarvest(e);},{passive:true});
document.addEventListener('pointermove',e=>{if(swActive)tryHarvest(e);},{passive:true});
document.addEventListener('pointerup',()=>{swActive=false;swSet.clear();});
function tryHarvest(e){
  const el=document.elementFromPoint(e.clientX,e.clientY); if(!el) return;
  const tile=el.closest('.t'); if(!tile) return;
  const c=+tile.dataset.c,r=+tile.dataset.r;
  const p=getAt(c,r);
  if(!p||!BLD[p.bid]?.isShelf||!p.hasYield||swSet.has(p.uid)) return;
  swSet.add(p.uid); playerHarvest(p,e.clientX,e.clientY);
}
function playerHarvest(p,px,py){
  const m=MSH.find(m=>m.id===p.mushroomId); if(!m) return;
  let amt=m.yld*(m.multi||1);
  amt=Math.floor(amt*comboMult(p,'value'));
  if(RESEARCH.find(r=>r.id==='bio1'&&r.done)) amt=Math.floor(amt*1.15);
  G.money+=amt;G.totalEarned+=amt;
  p.hasYield=false;p.yprog=0;updShelfDisp(p);
  if(p.pfEl) p.pfEl.style.width='0%';
  spawnPtcl(px,py-20,`+¥${amt}`,'#d4a017');
  spawnPtcl(px+16,py-36,m.ico,'#7ab648');
  updHdrUI();addLog(`✋ ${m.name} 手動収穫 +¥${amt}`);
}

vp2.addEventListener('pointerup',()=>panO=null);
vp2.addEventListener('touchstart',e=>{
  if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinchD0=Math.sqrt(dx*dx+dy*dy);pinchS0=sScale;}
},{passive:true});
vp2.addEventListener('touchmove',e=>{
  if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;sScale=Math.max(.5,Math.min(2.5,pinchS0*(Math.sqrt(dx*dx+dy*dy)/pinchD0)));applyTf();}
},{passive:true});

// ═══════════════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════════════
const SAVE_KEY='kinoko_v3';
function getSave(){
  return{
    money:G.money,day:G.day,year:G.year,rp:G.rp,sat:G.satisfaction,
    earned:G.totalEarned,nextUid:G.nextUid,
    placed:G.placed.map(p=>({uid:p.uid,bid:p.bid,col:p.col,row:p.row,
      mid:p.mushroomId,active:p.active,bp:p.bprog})),
    research:RESEARCH.map(r=>({id:r.id,done:r.done,prog:r.prog})),
    staff:STAFFD.map(sd=>({id:sd.id,hired:sd.hired})),
    log:G.log.slice(0,12),
  };
}
function loadSave(data){
  if(!data)return;
  G.money=data.money||1000;G.day=data.day||1;G.year=data.year||1;
  G.rp=data.rp||0;G.satisfaction=data.sat||40;G.totalEarned=data.earned||0;
  G.nextUid=data.nextUid||1;G.log=data.log||[];
  data.research?.forEach(r=>{const rr=RESEARCH.find(x=>x.id===r.id);if(rr){rr.done=r.done;rr.prog=r.prog;}});
  data.staff?.forEach(sd=>{const d=STAFFD.find(x=>x.id===sd.id);if(d)d.hired=sd.hired;});
  data.placed?.forEach(p=>{
    const pp={uid:p.uid||G.nextUid++,bid:p.bid,col:p.col,row:p.row,
      mushroomId:p.mid||null,active:p.active,bprog:p.bp||100,
      yprog:0,hasYield:false,harvestGt:0,el:null,icoEl:null,pfEl:null,coEl:null,rdEl:null};
    G.placed.push(pp);renderBld(pp);if(pp.mushroomId)updShelfDisp(pp);
  });
  rebuildWalk();updCombos();
}
function manualSave(){
  localStorage.setItem(SAVE_KEY,JSON.stringify(getSave()));
  const el=document.getElementById('sind');el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);addLog('💾 手動セーブ');
}
function autoSave(){
  G.saveTick++;
  if(G.saveTick%(30000/TICK_MS)===0) localStorage.setItem(SAVE_KEY,JSON.stringify(getSave()));
}

// ═══════════════════════════════════════════════
// STARTER SETUP
// ═══════════════════════════════════════════════
function starter(){
  doPlace('shelf',3,3);doPlace('collection_box',6,4);
  doPlace('path',4,3);doPlace('path',5,3);doPlace('path',5,4);
  doPlace('water',2,3);
  const sh=G.placed.find(p=>p.bid==='shelf');
  if(sh){sh.mushroomId='normal';updShelfDisp(sh);}
  updCombos();addLog('🌿 霧雨魔法キノコ園 開業！');
}

// ═══════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════
let aTick=0;
function loop(){
  aTick++;
  updStaff(); // every animation tick (100ms)
  if(aTick%GAME_TICKS===0){ // every 500ms
    updateYields();updateKitchen();gameDayTick();updHdrUI();autoSave();
    if(G.activeTab==='staff') renderStaffTab(document.getElementById('spi'));
    if(G.activeTab==='kitchen') renderKitchenTab(document.getElementById('spi'));
  }
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init(){
  initViewport();buildGrid();
  const saved=localStorage.getItem(SAVE_KEY);
  if(saved){try{loadSave(JSON.parse(saved));showBanner('💾 セーブデータを読み込んだ！');}catch{starter();}}
  else starter();
  initStaff();updHdrUI();
  setInterval(loop,TICK_MS);
  setTimeout(()=>showBanner('🍄 霧雨魔法キノコ園へようこそ！左メニューから建設を始めよう！'),800);
}
window.addEventListener('resize',()=>initViewport());
window.addEventListener('load',init);
</script>
