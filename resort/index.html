const ISLANDS=[

  {id:1,cx:1382,cy:618,r:47,name:'北東の崖'},
];

function inEl(x,y,cx,cy,rx,ry){return (x-cx)**2/rx**2+(y-cy)**2/ry**2<=1;}

function getTerrain(x,y){
  for(const c of CLIFFS) if(Math.hypot(x-c.cx,y-c.cy)<c.r) return 'cliff';
  if(inEl(x,y,MI.cx,MI.cy,MI.rx-80,MI.ry-80)) return 'grass';
  if(inEl(x,y,MI.cx,MI.cy,MI.rx,MI.ry)) return 'sand';
  for(const isl of ISLANDS){
    const d=Math.hypot(x-isl.cx,y-isl.cy);
    if(d<isl.r*.55) return 'grass';
    if(d<isl.r) return 'sand';
  }
  return 'water';
}
function isLand(x,y){return getTerrain(x,y)!=='water';}

// roundRect polyfill for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(+r||0,w/2,h/2);
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);
    return this;
  };
}
function rRect(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r);} // shorthand

const keys=new Set();
let interactJustPressed=false;
window.addEventListener('keydown',e=>{
keys.add(e.key);
if(e.key==='f'||e.key==='F'||e.key==='x'||e.key==='X') interactJustPressed=true;

});

// ══════════════════════════════════════════
//  INPUT – TOUCH
// ══════════════════════════════════════════
const jst={active:false,bx:0,by:0,cx:0,cy:0,dx:0,dy:0,id:-1};
let dashTouch=false,interactTouch=false;
const tchMap=new Map();
function touchRole(x,y){
const w=C.width,h=C.height;
if(Math.hypot(x-(w-75),y-(h-75))<60) return 'dash';
if(Math.hypot(x-(w-75),y-(h-170))<50) return 'act';  // action button
if(x<w*.48) return 'joy';
return null;
}
C.addEventListener('touchstart',e=>{
e.preventDefault();
for(const t of e.changedTouches){
const role=touchRole(t.clientX,t.clientY);
if(!role) continue;
tchMap.set(t.identifier,role);
if(role==='joy'){Object.assign(jst,{active:true,id:t.identifier,bx:t.clientX,by:t.clientY,cx:t.clientX,cy:t.clientY,dx:0,dy:0});}
else if(role==='dash') dashTouch=true;
else if(role==='act'){ interactTouch=true; interactJustPressed=true; }
}
},{passive:false});
C.addEventListener('touchmove',e=>{
e.preventDefault();
for(const t of e.changedTouches){
if(tchMap.get(t.identifier)!=='joy') continue;
jst.cx=t.clientX;jst.cy=t.clientY;
const dx=jst.cx-jst.bx,dy=jst.cy-jst.by,len=Math.hypot(dx,dy);
jst.dx=len>0?(dx/len)*Math.min(len/55,1):0;
jst.dy=len>0?(dy/len)*Math.min(len/55,1):0;
}
},{passive:false});
function endTch(id){
const role=tchMap.get(id);tchMap.delete(id);
if(role==='joy'){jst.active=false;jst.dx=jst.dy=0;}
if(role==='dash') dashTouch=false;
if(role==='act') interactTouch=false;
}
['touchend','touchcancel'].forEach(ev=>C.addEventListener(ev,e=>{e.preventDefault();for(const t of e.changedTouches)endTch(t.identifier);},{passive:false}));
// ══════════════════════════════════════════
//  NPC INTERACT
// ══════════════════════════════════════════
function tryInteract(){
if(!interactJustPressed) return;
interactJustPressed=false;
// NPC talk
for(const n of npcs){
if(Math.hypot(player.x-n.x,player.y-n.y)<56){
if(talkNpc===n){
talkLine++;
if(talkLine>=n.lines.length){
// last line → start mission stub
if(!n.mission.started){
n.mission.started=true;
showMsg(🏁 ミッション開始：「${n.mission.name}」（スタブ）,4000);
inv.stamps++;updateRightHud();
}
talkNpc=null;talkLine=0;
} else {
showMsg(${n.name}「${n.lines[talkLine]}」,4500);
}
} else {
talkNpc=n;talkLine=0;
showMsg(${n.name}「${n.lines[0]}」,4500);
}
return;
}
}
talkNpc=null;
// Chest open
for(const ch of chests){
if(!ch.open&&Math.hypot(player.x-ch.x,player.y-ch.y)<38){
ch.open=true;
if(ch.rw.includes('キー')){inv.keys++;updateRightHud();showMsg(📦 宝箱を開けた！シルバーキー +1 🗝️,3200);}
else if(ch.rw.includes('×3')){inv.stars+=3;showMsg(📦 宝箱を開けた！スター +3 ⭐,3000);}
else if(ch.rw.includes('×4')){inv.stars+=4;showMsg(📦 宝箱を開けた！スター +4 ⭐,3000);}
else if(ch.rw.includes('×5')){inv.stars+=5;showMsg(📦 宝箱を開けた！スター +5 ⭐,3000);}
spawnBurst(ch.x,ch.y,'#e8c030');
updateStarHud();
return;
}
}
}
function updateStarHud(){
const total=inv.stars;
hudEl.textContent=⭐ Stars: ${total} / 30;
hudEl.classList.remove('pop');void hudEl.offsetWidth;hudEl.classList.add('pop');
}

//  DRAW FUNCTIONS
// ══════════════════════════════════════════
function drawPalm(x,y){
ctx.save();ctx.translate(x+10,y+4);ctx.scale(1,.28);
ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.arc(0,0,16,0,Math.PI2);ctx.fill();ctx.restore();
ctx.strokeStyle='#7a5418';ctx.lineWidth=6;ctx.lineCap='round';
ctx.beginPath();ctx.moveTo(x,y);ctx.quadraticCurveTo(x+8,y-20,x+5,y-44);ctx.stroke();
[-1.2,-.65,-.1,.4,.9,1.5,2.1,2.7,-1.75].forEach((a,i)=>{
ctx.save();ctx.translate(x+5,y-44);ctx.rotate(a-Math.PI/2);
ctx.fillStyle=['#2a8028','#358a30','#248622','#3c9438'][i%4];
ctx.beginPath();ctx.ellipse(0,-16,4,20,0,0,Math.PI2);ctx.fill();ctx.restore();
});
ctx.fillStyle='#6b3a10';ctx.beginPath();ctx.arc(x+3,y-44,4,0,Math.PI*2);ctx.fill();
}
function drawBench(x,y){
ctx.fillStyle='#888';ctx.fillRect(x-11,y+2,4,7);ctx.fillRect(x+7,y+2,4,7);
ctx.fillStyle='#a07848';ctx.fillRect(x-14,y-3,28,5);
ctx.fillStyle='#8a6438';ctx.fillRect(x-14,y-10,28,5);
}
function drawStarShape(cx,cy,oR,iR){
ctx.beginPath();
for(let i=0;i<10;i++){const a=(i*Math.PI/5)-Math.PI/2,r=i%2?iR:oR;i?ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}
ctx.closePath();
}
function drawStarObj(s,ts){
if(s.col) return;
const pulse=.82+.18Math.sin(ts.004+s.phase),sz=12pulse;
const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,sz2.8);
g.addColorStop(0,rgba(255,220,40,${.65*pulse}));g.addColorStop(1,'rgba(255,160,0,0)');
ctx.fillStyle=g;ctx.beginPath();ctx.arc(s.x,s.y,sz2.8,0,Math.PI2);ctx.fill();
ctx.fillStyle='#FFE428';drawStarShape(s.x,s.y,sz,sz*.4);ctx.fill();
}
function drawKeyItem(k,ts){
if(k.col) return;
const bob=Math.sin(ts*.0028+k.id)5;
ctx.save();ctx.translate(k.x,k.y+bob);
ctx.shadowColor='#aad8ff';ctx.shadowBlur=14;
ctx.fillStyle='#b8e0ff';
ctx.beginPath();
ctx.arc(0,-6,7,0,Math.PI2);ctx.fill();
ctx.fillStyle='#c8eaff';ctx.beginPath();ctx.arc(-2,-7,3,0,Math.PI*2);ctx.fill();
ctx.strokeStyle='#b8e0ff';ctx.lineWidth=4;ctx.lineCap='round';
ctx.beginPath();ctx.moveTo(4,-2);ctx.lineTo(18,10);ctx.stroke();
ctx.fillStyle='#b8e0ff';ctx.fillRect(12,7,6,4);ctx.fillRect(16,11,6,4);
ctx.restore();ctx.shadowBlur=0;
}
function drawChest(ch,ts){
const pulse=Math.sin(ts*.003+ch.id)3;
ctx.save();ctx.translate(ch.x,ch.y);
if(!ch.open){
ctx.fillStyle='#8a5818';ctx.fillRect(-14,-10,28,18);
ctx.fillStyle='#a06820';ctx.fillRect(-14,-18,28,10);
ctx.strokeStyle='#d4a040';ctx.lineWidth=2;
ctx.strokeRect(-14,-18,28,28);
ctx.fillStyle='#d4a040';ctx.fillRect(-4,-14,8,5);ctx.beginPath();ctx.arc(0,-10,3,0,Math.PI2);ctx.fill();
// Glow
const g=ctx.createRadialGradient(0,0,4,0,0,28+pulse);
g.addColorStop(0,'rgba(255,200,40,.38)');g.addColorStop(1,'rgba(255,150,0,0)');
ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,28+pulse,0,Math.PI*2);ctx.fill();
ctx.fillStyle='rgba(255,255,255,.8)';ctx.font='9px Arial';ctx.textAlign='center';ctx.fillText('F',0,32);
} else {
ctx.fillStyle='#5a3808';ctx.fillRect(-14,0,28,10);
ctx.fillStyle='#7a4e18';ctx.fillRect(-14,-12,28,12);ctx.save();
ctx.translate(0,-12);ctx.rotate(-.6);ctx.fillStyle='#7a4e18';ctx.fillRect(-14,-10,28,10);ctx.restore();
ctx.strokeStyle='#a07030';ctx.lineWidth=2;
ctx.strokeRect(-14,0,28,10);
}
ctx.restore();
}
function drawNPC(n,ts){
const bob=Math.sin(ts*.002+n.id)3;
ctx.save();ctx.translate(n.x,n.y+bob);
// Shadow
ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(2,8,10,4,0,0,Math.PI2);ctx.fill();
// Body
ctx.fillStyle=n.col;ctx.beginPath();ctx.arc(0,-2,11,0,Math.PI2);ctx.fill();
ctx.fillStyle='#ffc880';ctx.beginPath();ctx.arc(0,-10,7,0,Math.PI2);ctx.fill();
// Eyes
ctx.fillStyle='#333';ctx.beginPath();ctx.arc(-2.5,-10,1.5,0,Math.PI2);ctx.arc(2.5,-10,1.5,0,Math.PI2);ctx.fill();
// Exclamation
if(Math.hypot(player.x-n.x,player.y-n.y)<90){
ctx.fillStyle='#ffe040';ctx.font='bold 16px Arial';ctx.textAlign='center';ctx.fillText('!',0,-26);
}
ctx.restore();
}
function drawJetSki(px,py,vx,vy,ts){
const angle=Math.atan2(vy,vx)||0;
const speed=Math.hypot(vx,vy);
ctx.save();ctx.translate(px,py);ctx.rotate(angle);
// Wake
if(speed>0.2){
for(let i=0;i<3;i++){
const wa=Math.PI*.85+.18i,wr=6+i8;
ctx.strokeStyle=rgba(255,255,255,${.4-i*.1});ctx.lineWidth=3-i*.5;
ctx.beginPath();ctx.arc(-wr*.6,0,wr,wa,-wa);ctx.stroke();
}
}
// Hull
ctx.fillStyle='#d02030';
ctx.beginPath();ctx.moveTo(24,0);ctx.lineTo(-12,-8);ctx.lineTo(-16,0);ctx.lineTo(-12,8);ctx.closePath();ctx.fill();
ctx.fillStyle='#f04050';
ctx.beginPath();ctx.moveTo(20,0);ctx.lineTo(-8,-5);ctx.lineTo(-10,0);ctx.lineTo(-8,5);ctx.closePath();ctx.fill();
ctx.fillStyle='rgba(180,240,255,.8)';ctx.beginPath();ctx.arc(6,-1,4,0,Math.PI2);ctx.fill();
// Handle
ctx.strokeStyle='#888';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(4,-5);ctx.lineTo(4,-13);ctx.stroke();
ctx.strokeStyle='#aaa';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(4,-13,6,Math.PI,0);ctx.stroke();
// Engine foam
if(speed>0.15){
ctx.fillStyle=rgba(255,255,255,${Math.min(.7,speed*.15)});
ctx.beginPath();ctx.arc(-16,0,5+speed1.8,0,Math.PI*2);ctx.fill();
}
ctx.restore();
}
function drawPlayer(px,py,terrain,ts,vx,vy){
const dashing=player.dashing;
// Hop arc visualization
const hop=player.hopping;
const hopT=hop?Math.sin(player.hopPhase/player.hopDur*Math.PI)*12:0;
if(terrain==='water'||hop){
drawJetSki(px,py,vx,vy,ts);
return;
}
// Shadow
ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(px+4,py+PR-1,PR*.9,4,0,0,Math.PI2);ctx.fill();
// Trail
if(dashing){
for(let i=3;i>=1;i--){
ctx.fillStyle=rgba(255,110,0,${.1*i});ctx.beginPath();
ctx.arc(px-vxi3,py-vyi3,PR(.9-i*.05),0,Math.PI2);ctx.fill();
}
}
// Body
ctx.fillStyle=dashing?'#ff8800':'#2196F3';ctx.beginPath();ctx.arc(px,py,PR,0,Math.PI2);ctx.fill();
ctx.fillStyle='#c02828';ctx.fillRect(px-PR-1,py-PR+3,PR2+2,3.5);
ctx.fillStyle='#dc3838';ctx.beginPath();ctx.arc(px,py-PR+3,PR.82,Math.PI,0);ctx.fill();
ctx.fillStyle='#ffc070';ctx.beginPath();ctx.arc(px,py+2,PR*.62,0,Math.PI2);ctx.fill();
ctx.fillStyle='#333';ctx.beginPath();ctx.arc(px-3.5,py,1.8,0,Math.PI2);ctx.arc(px+3.5,py,1.8,0,Math.PI2);ctx.fill();
ctx.strokeStyle='#aa4020';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(px,py+3,3.5,.12Math.PI,.88Math.PI);ctx.stroke();
if(dashing){
const gr=ctx.createRadialGradient(px,py,PR,px,py,PR+11);
gr.addColorStop(0,'rgba(255,130,0,.6)');gr.addColorStop(1,'rgba(255,70,0,0)');
ctx.fillStyle=gr;ctx.beginPath();ctx.arc(px,py,PR+11,0,Math.PI2);ctx.fill();
}
}
function drawTouchUI(){
const w=C.width,h=C.height,JR=55;
const jbx=jst.active?jst.bx:82,jby=jst.active?jst.by:h-82;
// Joy base
ctx.fillStyle='rgba(255,255,255,.07)';ctx.beginPath();ctx.arc(jbx,jby,JR,0,Math.PI2);ctx.fill();
ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(jbx,jby,JR,0,Math.PI2);ctx.stroke();
let hx=jbx,hy=jby;
if(jst.active){const dx=jst.cx-jst.bx,dy=jst.cy-jst.by,len=Math.hypot(dx,dy);if(len>0){const cl=Math.min(len,JR);hx=jbx+dx/lencl;hy=jby+dy/lencl;}}
ctx.fillStyle=jst.active?'rgba(255,255,255,.52)':'rgba(255,255,255,.16)';ctx.beginPath();ctx.arc(hx,hy,24,0,Math.PI2);ctx.fill();
ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(hx,hy,24,0,Math.PI2);ctx.stroke();
if(!jst.active){ctx.fillStyle='rgba(255,255,255,.28)';ctx.font='16px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('✦',jbx,jby);}
// B (dash)
const bx=w-75,by=h-75,bd=dashTouch||keys.has('Shift');
const bg=ctx.createRadialGradient(bx,by-5,0,bx,by,38);
bg.addColorStop(0,bd?'rgba(255,130,0,.92)':'rgba(210,40,70,.8)');bg.addColorStop(1,bd?'rgba(200,70,0,.7)':'rgba(150,10,40,.62)');
ctx.fillStyle=bg;ctx.beginPath();ctx.arc(bx,by,36,0,Math.PI2);ctx.fill();
ctx.strokeStyle=bd?'rgba(255,190,40,.9)':'rgba(255,100,130,.5)';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(bx,by,36,0,Math.PI2);ctx.stroke();
ctx.fillStyle='#fff';ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=4;ctx.font='bold 20px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('B',bx,by);ctx.shadowBlur=0;
// A (action/interact)
const ax=w-75,ay=h-168,ad=interactTouch;
const ag=ctx.createRadialGradient(ax,ay-4,0,ax,ay,34);
ag.addColorStop(0,ad?'rgba(40,200,40,.92)':'rgba(30,160,30,.8)');ag.addColorStop(1,ad?'rgba(10,140,10,.7)':'rgba(10,100,10,.62)');
ctx.fillStyle=ag;ctx.beginPath();ctx.arc(ax,ay,32,0,Math.PI2);ctx.fill();
ctx.strokeStyle=ad?'rgba(140,255,140,.9)':'rgba(80,200,80,.5)';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(ax,ay,32,0,Math.PI2);ctx.stroke();
ctx.fillStyle='#fff';ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=4;ctx.font='bold 18px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('A',ax,ay);ctx.shadowBlur=0;
ctx.fillStyle='rgba(255,255,255,.55)';ctx.font='9px Arial';ctx.fillText('話す',ax,ay+44);
}
function drawMinimap(){
const mx=C.width-108,my=10,mw=98,mh=98,sc=mw/MAP_W;
ctx.fillStyle='rgba(0,0,0,.58)';ctx.fillRect(mx-1,my-1,mw+2,mh+2);
// Ocean bg
ctx.fillStyle='#1a75b0';ctx.fillRect(mx,my,mw,mh);
// Main island
ctx.fillStyle='#5a9840';
ctx.beginPath();ctx.ellipse(mx+MI.cxsc,my+MI.cysc,MI.rxsc,MI.rysc,0,0,Math.PI2);ctx.fill();
// Small islands
for(const isl of ISLANDS){ctx.fillStyle='#9ab850';ctx.beginPath();ctx.arc(mx+isl.cxsc,my+isl.cysc,Math.max(2,isl.rsc),0,Math.PI2);ctx.fill();}
// Stars
ctx.fillStyle='#FFD700';for(const s of stars30)if(!s.col)ctx.fillRect(mx+s.xsc-1,my+s.ysc-1,2,2);
// Keys
ctx.fillStyle='#aaddff';for(const k of keyItems)if(!k.col)ctx.fillRect(mx+k.xsc-1,my+k.ysc-1,2,2);
// Player
ctx.fillStyle='#00ff88';ctx.beginPath();ctx.arc(mx+player.xsc,my+player.ysc,3,0,Math.PI2);ctx.fill();
// Viewport
ctx.strokeStyle='rgba(255,255,255,.38)';ctx.lineWidth=1;
ctx.strokeRect(mx+(player.x-C.width/2)sc,my+(player.y-C.height/2)sc,C.widthsc,C.heightsc);
ctx.strokeStyle='rgba(255,255,255,.28)';ctx.strokeRect(mx,my,mw,mh);
ctx.fillStyle='rgba(255,255,255,.45)';ctx.font='9px Arial';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('MAP',mx+3,my+3);
}
// ══════════════════════════════════════════
//  TERRAIN TRANSITION FLASH
// ══════════════════════════════════════════
let prevTerrain='grass',terrainFlash=0;
// ══════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════
let lastTs=0;
function loop(ts){
requestAnimationFrame(loop);
const dt=Math.min(ts-lastTs,50)/16.667;lastTs=ts;
// ── Input ──
player.dashing=keys.has('Shift')||dashTouch;
let mx=0,my=0;
if(keys.has('ArrowLeft')||keys.has('a')||keys.has('A')) mx-=1;
if(keys.has('ArrowRight')||keys.has('d')||keys.has('D')) mx+=1;
if(keys.has('ArrowUp')||keys.has('w')||keys.has('W')) my-=1;
if(keys.has('ArrowDown')||keys.has('s')||keys.has('S')) my+=1;
if(jst.active){mx+=jst.dx;my+=jst.dy;}
const il=Math.hypot(mx,my);if(il>1){mx/=il;my/=il;}
// ── Hop mechanic ──
if(player.hopping){
player.hopPhase++;
const t=player.hopPhase/player.hopDur;
player.x+=player.hopVx;
player.y+=player.hopVy;
if(player.hopPhase>=player.hopDur){
player.hopping=false;
// land check
const tr=getTerrain(player.x,player.y);
if(tr==='cliff'){ showMsg('🧗 崖の上に上がった！ Fキーで宝箱を開けよう',3200); }
}
} else {
// Dash-hop trigger: pressing X or touch interact while dashing near cliff edge
if(interactJustPressed && player.dashing && (keys.has('x')||keys.has('X'))){
interactJustPressed=false; // consumed
}
// Auto hop attempt: dash into cliff
if(player.dashing){
for(const c of CLIFFS){
const dist=Math.hypot(player.x-c.cx,player.y-c.cy);
if(dist>c.r1.1&&dist<c.r1.8&&(mx!==0||my!==0)){
// Check approach direction
const tdx=(c.cx-player.x)/dist,tdy=(c.cy-player.y)/dist;
const dot=mxtdx+mytdy;
if(dot>.55){
// Launch hop
player.hopping=true;
player.hopPhase=0;
player.hopDur=22;
player.hopVx=tdx3.2;
player.hopVy=tdy3.2;
showMsg('🏃 崖ホップ！',1500);
break;
}
}
}
}
if(!player.hopping){
const terrain=getTerrain(player.x,player.y);
const onWater=terrain==='water';
const spd=BASE_SPD*(player.dashing?DASH_MULT:1)(onWater?WATER_MULT:1)dt;
player.vx=mxspd;player.vy=myspd;
let nx=player.x+player.vx,ny=player.y+player.vy;
// Water move unrestricted; on-land: cant enter cliff without hop
const ntr=getTerrain(nx,ny);
if(ntr==='cliff'&&!player.hopping){
// block direct entry
nx=player.x;ny=player.y;
}
player.x=Math.max(PR,Math.min(MAP_W-PR,nx));
player.y=Math.max(PR,Math.min(MAP_H-PR,ny));
player.terrain=terrain;
player.onWater=onWater;
if(terrain!==prevTerrain){
if(terrain==='water'){ setOutfit('ジェットスキー'); terrainFlash=30; showMsg('💦 水上バイクで爆走！',2000); }
else if(prevTerrain==='water'){ setOutfit('サーファー'); terrainFlash=20; }
else if(terrain==='cliff'){ setOutfit('探検家'); }
prevTerrain=terrain;
}
}
}
// ── Collect stars ──
for(const s of stars30){
if(!s.col&&Math.hypot(player.x-s.x,player.y-s.y)<COLLECT_R){
s.col=true;inv.stars++;spawnBurst(s.x,s.y);updateStarHud();
if(inv.stars>=30) setTimeout(()=>showMsg('🎉 全スター収集！リゾートマスター！',5000),200);
}
}
// ── Collect keys ──
for(const k of keyItems){
if(!k.col&&Math.hypot(player.x-k.x,player.y-k.y)<28){
k.col=true;inv.keys++;updateRightHud();spawnBurst(k.x,k.y,'#aaddff');
showMsg('🗝️ シルバーキーを入手！',2800);
}
}
// ── NPC interact button ──
tryInteract();
// ── Particles ──
for(let i=parts.length-1;i>=0;i--){
const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life-=.036;
if(p.life<=0) parts.splice(i,1);
}
// ── Ripples ──
for(const r of ripples){
r.life+=.006;
if(r.life>1){r.life=0;r.maxR=12+Math.random()*38;let att=0;do{r.x=Math.random()*MAP_W;r.y=Math.random()*MAP_H;att++;}while(isLand(r.x,r.y)&&att<30);}
}
// ════════════ RENDER ════════════
ctx.clearRect(0,0,C.width,C.height);
const camX=C.width/2-player.x,camY=C.height/2-player.y;
ctx.save();ctx.translate(camX,camY);
ctx.drawImage(mapOC,0,0);
// Animated ripples
for(const r of ripples){
const alpha=Math.sin(r.lifeMath.PI)0.28;
ctx.strokeStyle=rgba(255,255,255,${alpha});ctx.lineWidth=1.5;
ctx.beginPath();ctx.arc(r.x,r.y,r.maxRr.life,0,Math.PI2);ctx.stroke();
}
// Stars
for(const s of stars30) drawStarObj(s,ts);
// Key items
for(const k of keyItems) drawKeyItem(k,ts);
// Chests
for(const ch of chests) drawChest(ch,ts);
// Particles
ctx.save();
for(const p of parts){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
ctx.globalAlpha=1;ctx.restore();
// Depth-sorted scene
const scene=[
...PALMS.map(o=>({...o,type:'palm'})),
...BENCHES.map(o=>({...o,type:'bench'})),
...npcs.map(n=>({...n,type:'npc'})),
{x:player.x,y:player.y,type:'player'}
].sort((a,b)=>a.y-b.y);
for(const obj of scene){
if(obj.type==='palm') drawPalm(obj.x,obj.y);
else if(obj.type==='bench') drawBench(obj.x,obj.y);
else if(obj.type==='npc') drawNPC(obj,ts);
else drawPlayer(player.x,player.y,player.terrain,ts,player.vx,player.vy);
}
ctx.restore();
// ── Screen flash on terrain change ──
if(terrainFlash>0){
ctx.fillStyle=rgba(120,220,255,${terrainFlash/30*.35});
ctx.fillRect(0,0,C.width,C.height);
terrainFlash--;
}
drawTouchUI();
drawMinimap();
}
requestAnimationFrame(loop);
</script>
