<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ゴーバケーション ─ Open World Prototype</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none}
canvas{display:block;touch-action:none}
#hud{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.62);backdrop-filter:blur(6px);
  color:#FFD700;font:bold 20px/1 'Arial Rounded MT Bold',Arial,sans-serif;
  padding:9px 24px;border-radius:30px;
  border:2px solid rgba(255,215,0,.4);pointer-events:none;
  text-shadow:0 0 10px rgba(255,215,0,.8);white-space:nowrap;
}
#hud.pop{animation:pop .3s ease;}
@keyframes pop{0%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.32)}100%{transform:translateX(-50%) scale(1)}}
#msg{
  position:fixed;top:62px;left:50%;transform:translateX(-50%);
  color:#fff;font:bold 15px Arial;background:rgba(0,0,0,.58);
  padding:6px 18px;border-radius:14px;pointer-events:none;
  opacity:0;transition:opacity .4s;white-space:nowrap;
}
#hint{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.45);font:12px Arial;pointer-events:none;
  text-align:center;transition:opacity 1s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">⭐ Stars: 0 / 30</div>
<div id="msg"></div>
<div id="hint">WASD / 矢印キーで移動 ｜ Shift でダッシュ</div>
<script>
'use strict';

// ════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════
const MAP_W     = 2000;
const MAP_H     = 2000;
const PLAYER_R  = 14;
const COLLECT_R = 22;
const BASE_SPD  = 3.5;
const DASH_MULT = 1.5;
const N_STARS   = 30;
const N_PALMS   = 55;
const N_BENCHES = 28;

// ════════════════════════════════════════════
//  CANVAS
// ════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const hud    = document.getElementById('hud');
const msgEl  = document.getElementById('msg');
const hint   = document.getElementById('hint');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();
setTimeout(() => hint.style.opacity = '0', 4000);

// ════════════════════════════════════════════
//  HELPER FUNCTIONS  (hoisted declarations)
// ════════════════════════════════════════════
function inWater(x, y) { return y > 1850 || x > 1850; }
function inRoad(x, y)  {
  return Math.abs(y - 1000) < 75 || Math.abs(x - 1000) < 75
      || (Math.abs(y - 428) < 48 && x < 940)
      || (Math.abs(x - 428) < 48 && y < 940);
}
function randPos(margin, noWater, noRoad) {
  let x, y;
  do {
    x = margin + Math.random() * (MAP_W - margin * 2);
    y = margin + Math.random() * (MAP_H - margin * 2);
  } while ((noWater && inWater(x, y)) || (noRoad && inRoad(x, y)));
  return { x, y };
}

// ════════════════════════════════════════════
//  OFFSCREEN MAP  (rendered once)
// ════════════════════════════════════════════
const mapOC = document.createElement('canvas');
mapOC.width = MAP_W; mapOC.height = MAP_H;
const mc = mapOC.getContext('2d');

(function buildMap() {
  // ── Grass base ──
  mc.fillStyle = '#4d9640';
  mc.fillRect(0, 0, MAP_W, MAP_H);
  [[300,220,200],[720,480,170],[1220,320,210],[420,1230,160],
   [1520,620,195],[820,1430,230],[1620,1310,180],[220,1620,165],
   [600,900,140],[1400,1600,160]
  ].forEach(([gx,gy,gr]) => {
    const g = mc.createRadialGradient(gx,gy,0,gx,gy,gr);
    g.addColorStop(0,'#60b04e'); g.addColorStop(1,'rgba(77,150,64,0)');
    mc.fillStyle = g;
    mc.beginPath(); mc.arc(gx,gy,gr,0,Math.PI*2); mc.fill();
  });

  // ── Beach ──
  mc.fillStyle = '#d5b87a';
  mc.fillRect(0,1660,MAP_W,340);
  mc.fillRect(1660,0,340,1660);

  // ── Ocean ──
  mc.fillStyle = '#2e9fce';
  mc.fillRect(0,1860,MAP_W,140);
  mc.fillRect(1860,0,140,MAP_H);
  mc.fillStyle = '#1e8ab8';
  mc.fillRect(1860,1860,140,140);
  mc.strokeStyle = 'rgba(255,255,255,.2)'; mc.lineWidth = 4;
  for (let i=0;i<5;i++) {
    const wy=1868+i*24;
    mc.beginPath();
    for (let wx=0;wx<MAP_W;wx+=70) {
      mc.moveTo(wx,wy); mc.quadraticCurveTo(wx+35,wy-7,wx+70,wy);
    }
    mc.stroke();
  }

  // ── Roads ──
  mc.fillStyle = '#5e5e5e';
  mc.fillRect(0,940,MAP_W,120);
  mc.fillRect(940,0,120,MAP_H);
  mc.fillRect(0,383,940,90);
  mc.fillRect(1060,383,940,90);
  mc.fillRect(383,0,90,940);
  mc.fillRect(383,1060,90,600);

  mc.strokeStyle = 'rgba(255,255,180,.6)'; mc.lineWidth = 3;
  mc.setLineDash([35,35]);
  mc.beginPath(); mc.moveTo(0,1000);  mc.lineTo(MAP_W,1000); mc.stroke();
  mc.beginPath(); mc.moveTo(1000,0);  mc.lineTo(1000,MAP_H); mc.stroke();
  mc.setLineDash([]);
  mc.strokeStyle = 'rgba(255,230,30,.5)'; mc.lineWidth = 2;
  [[0,942,MAP_W,942],[0,1058,MAP_W,1058],
   [942,0,942,MAP_H],[1058,0,1058,MAP_H]].forEach(([x1,y1,x2,y2])=>{
    mc.beginPath(); mc.moveTo(x1,y1); mc.lineTo(x2,y2); mc.stroke();
  });

  // ── Park ──
  mc.fillStyle = '#3a7e28';
  mc.fillRect(510,510,320,320);
  mc.fillStyle = '#b8a870';
  mc.fillRect(510,657,320,26);
  mc.fillRect(657,510,26,320);
  mc.fillStyle = '#52b8d8';
  mc.beginPath(); mc.arc(670,670,28,0,Math.PI*2); mc.fill();
  mc.strokeStyle = '#38a0c0'; mc.lineWidth=3; mc.stroke();
  mc.fillStyle = '#84d8f8';
  mc.beginPath(); mc.arc(670,670,10,0,Math.PI*2); mc.fill();

  // ── Hotel ──
  mc.fillStyle = '#f0e8d0';
  mc.fillRect(1100,55,490,180);
  mc.fillStyle = '#7ed4f4';
  for (let wi=0;wi<7;wi++) for (let wj=0;wj<3;wj++)
    mc.fillRect(1114+wi*62, 70+wj*50, 40, 30);
  mc.fillStyle = '#c03030';
  mc.beginPath();
  mc.moveTo(1085,55); mc.lineTo(1345,12); mc.lineTo(1600,55);
  mc.closePath(); mc.fill();
  mc.fillStyle = '#8a7050'; mc.fillRect(1310,186,70,49);
  mc.fillStyle = '#5a4020'; mc.fillRect(1325,200,40,35);

  // ── Pool ──
  mc.fillStyle = '#44b8dc';
  mc.fillRect(1195,255,290,160);
  mc.strokeStyle = '#80d8fc'; mc.lineWidth=4;
  mc.strokeRect(1195,255,290,160);
  mc.fillStyle = '#e8d0a0';
  mc.fillRect(1180,240,320,15); mc.fillRect(1180,415,320,15);
  mc.fillRect(1180,255,15,160); mc.fillRect(1485,255,15,160);
  mc.strokeStyle = 'rgba(255,255,255,.35)'; mc.lineWidth=2;
  for (let l=1;l<4;l++) {
    mc.beginPath();
    mc.moveTo(1195,255+160/4*l); mc.lineTo(1485,255+160/4*l); mc.stroke();
  }

  // ── Courtyard / Plaza ──
  mc.fillStyle = '#c8b888';
  mc.fillRect(100,100,200,200);
  mc.strokeStyle = '#a8986a'; mc.lineWidth=2;
  for (let ti=0;ti<4;ti++) for (let tj=0;tj<4;tj++)
    mc.strokeRect(100+ti*50,100+tj*50,50,50);

  // ── Tennis court ──
  mc.fillStyle = '#5880c0';
  mc.fillRect(200,1200,220,110);
  mc.strokeStyle = '#fff'; mc.lineWidth=2;
  mc.strokeRect(205,1205,210,100);
  mc.beginPath(); mc.moveTo(310,1205); mc.lineTo(310,1305); mc.stroke();
  mc.beginPath(); mc.moveTo(205,1255); mc.lineTo(415,1255); mc.stroke();
})();

// ════════════════════════════════════════════
//  GAME OBJECTS
// ════════════════════════════════════════════
const player = { x:1000, y:1200, vx:0, vy:0, dashing:false };

const stars = Array.from({ length: N_STARS }, () => {
  const p = randPos(80, true, false);
  return { ...p, phase: Math.random()*Math.PI*2, collected:false };
});
let starsCollected = 0;

const parts   = [];
const palms   = Array.from({ length: N_PALMS   }, () => randPos(80, true, true));
const benches = Array.from({ length: N_BENCHES }, () => randPos(100, true, false));

// ════════════════════════════════════════════
//  INPUT – KEYBOARD
// ════════════════════════════════════════════
const keys = new Set();
window.addEventListener('keydown', e => { keys.add(e.key); e.key===' ' && e.preventDefault(); });
window.addEventListener('keyup',   e => keys.delete(e.key));

// ════════════════════════════════════════════
//  INPUT – TOUCH
// ════════════════════════════════════════════
const jst = { active:false, bx:0, by:0, cx:0, cy:0, dx:0, dy:0, id:-1 };
let dashTouch = false;
const tchMap  = new Map();

function touchRole(x, y) {
  const w = canvas.width, h = canvas.height;
  if (Math.hypot(x-(w-75), y-(h-75)) < 62) return 'dash';
  if (x < w * 0.46) return 'joy';
  return null;
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const role = touchRole(t.clientX, t.clientY);
    if (!role) continue;
    tchMap.set(t.identifier, role);
    if (role === 'joy') {
      Object.assign(jst, {
        active:true, id:t.identifier,
        bx:t.clientX, by:t.clientY,
        cx:t.clientX, cy:t.clientY,
        dx:0, dy:0
      });
    } else { dashTouch = true; }
  }
}, { passive:false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (tchMap.get(t.identifier) !== 'joy') continue;
    jst.cx = t.clientX; jst.cy = t.clientY;
    const dx=jst.cx-jst.bx, dy=jst.cy-jst.by;
    const len=Math.hypot(dx,dy);
    jst.dx = len>0 ? (dx/len)*Math.min(len/55,1) : 0;
    jst.dy = len>0 ? (dy/len)*Math.min(len/55,1) : 0;
  }
}, { passive:false });

function endTouch(id) {
  const role=tchMap.get(id); tchMap.delete(id);
  if (role==='joy')  { jst.active=false; jst.dx=jst.dy=0; }
  if (role==='dash') { dashTouch=false; }
}
['touchend','touchcancel'].forEach(ev =>
  canvas.addEventListener(ev, e => {
    e.preventDefault();
    for (const t of e.changedTouches) endTouch(t.identifier);
  }, { passive:false })
);

// ════════════════════════════════════════════
//  PARTICLE BURST
// ════════════════════════════════════════════
function spawnBurst(x, y) {
  for (let i=0;i<16;i++) {
    const a=(i/16)*Math.PI*2;
    const spd=1.5+Math.random()*3.5;
    parts.push({
      x, y,
      vx:Math.cos(a)*spd,
      vy:Math.sin(a)*spd-1.4,
      life:1,
      r:3+Math.random()*4,
      color:`hsl(${40+Math.random()*30},100%,${55+Math.random()*20}%)`
    });
  }
}

// ════════════════════════════════════════════
//  DRAWING FUNCTIONS
// ════════════════════════════════════════════
function drawPalm(x, y) {
  // Shadow
  ctx.save();
  ctx.translate(x+12, y+4); ctx.scale(1,.28);
  ctx.fillStyle='rgba(0,0,0,.22)';
  ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // Trunk
  ctx.strokeStyle='#7a5818'; ctx.lineWidth=7; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.quadraticCurveTo(x+9,y-22,x+6,y-46);
  ctx.stroke();
  // Fronds
  const angles=[-1.2,-.65,-.1,.4,.9,1.5,2.1,2.7,-1.75];
  const cols=['#2a8028','#358a30','#248622','#3c9438'];
  angles.forEach((a,i) => {
    ctx.save();
    ctx.translate(x+6,y-47); ctx.rotate(a-Math.PI/2);
    ctx.fillStyle=cols[i%4];
    ctx.beginPath(); ctx.ellipse(0,-17,4.5,22,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  ctx.fillStyle='#6b3a10';
  ctx.beginPath(); ctx.arc(x+4,y-46,5,0,Math.PI*2); ctx.fill();
}

function drawBench(x, y) {
  ctx.fillStyle='#888';
  ctx.fillRect(x-13,y+2,4,8); ctx.fillRect(x+9,y+2,4,8);
  ctx.fillStyle='#a07848'; ctx.fillRect(x-16,y-3,32,6);
  ctx.fillStyle='#8a6438'; ctx.fillRect(x-16,y-11,32,6);
}

function drawStarShape(cx, cy, oR, iR, n) {
  ctx.beginPath();
  for (let i=0;i<n*2;i++) {
    const a=(i*Math.PI/n)-Math.PI/2;
    const r=i%2===0?oR:iR;
    i===0 ? ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r)
           : ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
  }
  ctx.closePath();
}

function drawStarObj(s, ts) {
  if (s.collected) return;
  const pulse = .82+.18*Math.sin(ts*.004+s.phase);
  const sz = 12*pulse;
  const g = ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,sz*3);
  g.addColorStop(0,`rgba(255,220,40,${.7*pulse})`);
  g.addColorStop(1,'rgba(255,160,0,0)');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(s.x,s.y,sz*3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFE428';
  drawStarShape(s.x,s.y,sz,sz*.4,5); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.75)';
  drawStarShape(s.x-sz*.15,s.y-sz*.15,sz*.3,sz*.12,5); ctx.fill();
}

function drawPlayer(ts) {
  const {x,y,vx,vy,dashing} = player;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.25)';
  ctx.beginPath();
  ctx.ellipse(x+4,y+PLAYER_R-2,PLAYER_R,5,0,0,Math.PI*2); ctx.fill();
  // Dash trail
  if (dashing) {
    for (let i=3;i>=1;i--) {
      ctx.fillStyle=`rgba(255,120,0,${.1*i})`;
      ctx.beginPath();
      ctx.arc(x-vx*i*3,y-vy*i*3,PLAYER_R*(.9-i*.05),0,Math.PI*2); ctx.fill();
    }
  }
  // Body
  ctx.fillStyle = dashing ? '#ff8800' : '#2196F3';
  ctx.beginPath(); ctx.arc(x,y,PLAYER_R,0,Math.PI*2); ctx.fill();
  // Hat
  ctx.fillStyle='#b52020';
  ctx.fillRect(x-PLAYER_R-2,y-PLAYER_R+3,PLAYER_R*2+4,4);
  ctx.fillStyle='#d83030';
  ctx.beginPath(); ctx.arc(x,y-PLAYER_R+3,PLAYER_R*.85,Math.PI,0); ctx.fill();
  // Face
  ctx.fillStyle='#ffc070';
  ctx.beginPath(); ctx.arc(x,y+2,PLAYER_R*.65,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#333';
  ctx.beginPath();
  ctx.arc(x-4,y,2,0,Math.PI*2); ctx.arc(x+4,y,2,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#aa4020'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(x,y+3,4,.1*Math.PI,.9*Math.PI); ctx.stroke();
  // Dash glow ring
  if (dashing) {
    const gr=ctx.createRadialGradient(x,y,PLAYER_R,x,y,PLAYER_R+12);
    gr.addColorStop(0,'rgba(255,140,0,.6)');
    gr.addColorStop(1,'rgba(255,80,0,0)');
    ctx.fillStyle=gr;
    ctx.beginPath(); ctx.arc(x,y,PLAYER_R+12,0,Math.PI*2); ctx.fill();
  }
}

function drawTouchUI() {
  const w=canvas.width, h=canvas.height;
  const JR=55;
  const jbx = jst.active ? jst.bx : 85;
  const jby = jst.active ? jst.by : h-85;

  // Joystick base
  ctx.fillStyle='rgba(255,255,255,.07)';
  ctx.beginPath(); ctx.arc(jbx,jby,JR,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(jbx,jby,JR,0,Math.PI*2); ctx.stroke();

  // Handle
  let hx=jbx, hy=jby;
  if (jst.active) {
    const dx=jst.cx-jst.bx, dy=jst.cy-jst.by;
    const len=Math.hypot(dx,dy);
    if (len>0) {
      const cl=Math.min(len,JR);
      hx=jbx+(dx/len)*cl; hy=jby+(dy/len)*cl;
    }
  }
  ctx.fillStyle = jst.active ? 'rgba(255,255,255,.55)' : 'rgba(255,255,255,.18)';
  ctx.beginPath(); ctx.arc(hx,hy,26,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(hx,hy,26,0,Math.PI*2); ctx.stroke();
  if (!jst.active) {
    ctx.fillStyle='rgba(255,255,255,.28)';
    ctx.font='18px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('✦',jbx,jby);
  }

  // B Button (dash)
  const bx=w-75, by=h-75;
  const active=dashTouch||keys.has('Shift');
  const bg=ctx.createRadialGradient(bx,by-5,0,bx,by,40);
  bg.addColorStop(0, active?'rgba(255,130,0,.92)':'rgba(210,40,70,.8)');
  bg.addColorStop(1, active?'rgba(200,70,0,.72)':'rgba(150,10,40,.65)');
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.arc(bx,by,38,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=active?'rgba(255,190,40,.9)':'rgba(255,100,130,.6)';
  ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(bx,by,38,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=5;
  ctx.font='bold 22px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('B',bx,by);
  ctx.shadowBlur=0;
  if (active) {
    ctx.fillStyle='rgba(255,210,0,.9)';
    ctx.font='bold 11px Arial';
    ctx.fillText('DASH!',bx,by+54);
  }
}

function drawMinimap() {
  const mx=canvas.width-114, my=10;
  const mw=104, mh=104;
  const sc=mw/MAP_W;

  ctx.fillStyle='rgba(0,0,0,.55)';
  ctx.fillRect(mx-1,my-1,mw+2,mh+2);

  // Zones
  ctx.fillStyle='#4d9640'; ctx.fillRect(mx,my,mw,mh);
  ctx.fillStyle='#c4a470';
  ctx.fillRect(mx+1660*sc,my,(MAP_W-1660)*sc,mh);
  ctx.fillRect(mx,my+1660*sc,mw,(MAP_H-1660)*sc);
  ctx.fillStyle='#2e9fce';
  ctx.fillRect(mx+1860*sc,my,(MAP_W-1860)*sc,mh);
  ctx.fillRect(mx,my+1860*sc,mw,(MAP_H-1860)*sc);
  ctx.fillStyle='#5e5e5e';
  ctx.fillRect(mx,my+940*sc,mw,120*sc);
  ctx.fillRect(mx+940*sc,my,120*sc,mh);

  // Stars
  ctx.fillStyle='#FFD700';
  for (const s of stars)
    if (!s.collected) ctx.fillRect(mx+s.x*sc-1,my+s.y*sc-1,2,2);

  // Player
  ctx.fillStyle='#00ff88';
  ctx.beginPath(); ctx.arc(mx+player.x*sc,my+player.y*sc,3,0,Math.PI*2); ctx.fill();

  // Viewport rect
  ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.lineWidth=1;
  ctx.strokeRect(
    mx+(player.x-canvas.width/2)*sc,
    my+(player.y-canvas.height/2)*sc,
    canvas.width*sc, canvas.height*sc
  );
  ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1;
  ctx.strokeRect(mx,my,mw,mh);

  // Label
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.font='9px Arial'; ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText('MAP',mx+3,my+3);
}

// ════════════════════════════════════════════
//  MESSAGE
// ════════════════════════════════════════════
let msgTimer=null;
function showMsg(text) {
  msgEl.textContent=text; msgEl.style.opacity='1';
  clearTimeout(msgTimer);
  msgTimer=setTimeout(()=>msgEl.style.opacity='0',3200);
}

// ════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════
let lastTs=0;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min(ts-lastTs,50)/16.667;
  lastTs = ts;

  // ── Player ──
  player.dashing = keys.has('Shift') || dashTouch;

  let mx=0, my=0;
  if (keys.has('ArrowLeft')  || keys.has('a') || keys.has('A')) mx -= 1;
  if (keys.has('ArrowRight') || keys.has('d') || keys.has('D')) mx += 1;
  if (keys.has('ArrowUp')    || keys.has('w') || keys.has('W')) my -= 1;
  if (keys.has('ArrowDown')  || keys.has('s') || keys.has('S')) my += 1;
  if (jst.active) { mx+=jst.dx; my+=jst.dy; }

  const il=Math.hypot(mx,my);
  if (il>1) { mx/=il; my/=il; }

  const spd = BASE_SPD * (player.dashing ? DASH_MULT : 1) * dt;
  player.vx = mx*spd; player.vy = my*spd;
  player.x = Math.max(PLAYER_R, Math.min(MAP_W-PLAYER_R, player.x+player.vx));
  player.y = Math.max(PLAYER_R, Math.min(MAP_H-PLAYER_R, player.y+player.vy));

  // ── Star collection ──
  for (const s of stars) {
    if (!s.collected && Math.hypot(player.x-s.x,player.y-s.y) < COLLECT_R) {
      s.collected = true;
      starsCollected++;
      spawnBurst(s.x,s.y);
      hud.textContent = `⭐ Stars: ${starsCollected} / ${N_STARS}`;
      hud.classList.remove('pop');
      void hud.offsetWidth;
      hud.classList.add('pop');
      if (starsCollected===N_STARS)
        setTimeout(()=>showMsg('🎉 全スター収集完了！リゾートマスター！'),200);
    }
  }

  // ── Particles ──
  for (let i=parts.length-1;i>=0;i--) {
    const p=parts[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=.08;
    p.life-=.038;
    if (p.life<=0) parts.splice(i,1);
  }

  // ── Render ──
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const camX = canvas.width/2  - player.x;
  const camY = canvas.height/2 - player.y;

  ctx.save();
  ctx.translate(camX,camY);

  // Map
  ctx.drawImage(mapOC,0,0);

  // Stars
  for (const s of stars) drawStarObj(s,ts);

  // Particles
  for (const p of parts) {
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Scene (depth sort Y)
  const scene = [
    ...palms.map(o   => ({...o,type:'palm'})),
    ...benches.map(o => ({...o,type:'bench'})),
    { x:player.x, y:player.y, type:'player' }
  ].sort((a,b)=>a.y-b.y);

  for (const obj of scene) {
    if      (obj.type==='palm')   drawPalm(obj.x,obj.y);
    else if (obj.type==='bench')  drawBench(obj.x,obj.y);
    else                          drawPlayer(ts);
  }

  ctx.restore();

  // Fixed HUD
  drawTouchUI();
  drawMinimap();
}

requestAnimationFrame(loop);
</script>
</body>
</html>
